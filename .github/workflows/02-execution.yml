name: "2. Playwright Execution"

on:
  workflow_run:
    workflows: ["1. Setup and Prep"]
    types: [completed]

jobs:
  run-flow:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      BOL_PASSWORD: ${{ secrets.BOL_PASSWORD }}
      PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
      PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
      PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: "[System] Download Workspace"
        uses: actions/download-artifact@v4
        with:
          name: bol-workspace

      - name: "[System] Install Dependencies"
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: "[Action] Execute Flow"
        shell: bash
        run: |
          export BOL_EMAIL=$(cat selected_email.txt)
          
          cat > bol-flow.spec.js <<'EOF'
          const { test, expect, chromium } = require('@playwright/test');
          const fs = require('fs');
          const path = require('path');

          test('Full inline chain', async ({}, testInfo) => {
            const email = process.env.BOL_EMAIL;
            const password = process.env.BOL_PASSWORD;
            const botToken = process.env.TELEGRAM_BOT_TOKEN;
            const chatId = process.env.TELEGRAM_CHAT_ID;
            
            let attempts = 0;
            const maxAttempts = 3;
            let success = false;

            async function sendTelegramAlert(filePath, caption) {
              if (!botToken || !chatId) return;
              try {
                const { request } = require('@playwright/test');
                const apiContext = await request.newContext();
                const fileBuffer = fs.readFileSync(filePath);
                await apiContext.post(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                  multipart: {
                    chat_id: chatId, caption: caption,
                    photo: { name: path.basename(filePath), mimeType: 'image/png', buffer: fileBuffer }
                  }
                });
              } catch (err) { console.error(err); }
            }

            while (attempts < maxAttempts && !success) {
              attempts++;
              const browser = await chromium.launch({ headless: false, args: ['--disable-blink-features=AutomationControlled'] });
              const context = await browser.newContext({
                proxy: { server: process.env.PROXY_SERVER, username: process.env.PROXY_USERNAME, password: process.env.PROXY_PASSWORD }
              });
              const page = await context.newPage();
              try {
                await page.goto('https://www.bol.com/nl/nl/', { waitUntil: 'domcontentloaded' });
                const cookieBtn = page.getByRole('button', { name: /Accepteren/i }).first();
                try { await cookieBtn.click({ timeout: 5000 }); } catch (e) {}

                await page.getByRole('link', { name: /Inloggen/i }).first().click();
                await page.waitForURL('**/login**');
                await page.getByRole('textbox', { name: 'E-mailadres' }).fill(email);
                await page.getByRole('textbox', { name: 'Wachtwoord' }).fill(password);
                await page.getByRole('button', { name: 'Inloggen' }).click();

                await Promise.race([
                  page.waitForURL('**/account/overzicht**', { timeout: 40000 }),
                  page.waitForSelector('text=Ik ben geen robot', { timeout: 40000 }).then(() => { throw new Error('RETRY_FLOW'); })
                ]);

                await page.goto('https://www.bol.com/nl/order/basket/addItems.html?productId=9300000035840899&offerUid=5589e402-f3f8-446a-8495-383cb58b6cb6&quantity=1');
                const successPath = `success-attempt-${attempts}.png`;
                await page.screenshot({ path: successPath });
                await sendTelegramAlert(successPath, `Success on attempt ${attempts}`);
                success = true;
              } catch (err) {
                const failPath = `fail-attempt-${attempts}.png`;
                await page.screenshot({ path: failPath });
                await sendTelegramAlert(failPath, `Error: ${err.message}`);
              } finally {
                await browser.close();
              }
            }
            if (!success) throw new Error("Flow failed");
          });
          EOF
          
          xvfb-run npx playwright test bol-flow.spec.js

      - name: "[System] Upload Results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bol-results
          path: |
            *.png
            selected_email.txt
            data/registered-emails.yml
