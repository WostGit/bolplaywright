name: Playwright Bol Login & Add to Cart
on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]


permissions:
  contents: read

jobs:
  playwright-cart:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Auth State
        uses: actions/download-artifact@v4
        with:
          name: playwright-state
          path: .
        continue-on-error: true

      - name: Create package.json
        shell: bash
        run: |
          set -euo pipefail
          cat > package.json <<'EOF'
          {
            "name": "playwright-bol-cart",
            "private": true,
            "devDependencies": {
              "@playwright/test": "^1.54.0",
              "playwright-extra": "^4.3.6",
              "puppeteer-extra-plugin-stealth": "^2.11.2"
            }
          }
          EOF

      - name: Install Node dependencies
        shell: bash
        run: npm install

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        shell: bash
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        shell: bash
        run: npx playwright install-deps chromium

      - name: Create Playwright config
        shell: bash
        run: |
          set -euo pipefail
          cat > playwright.config.js <<'EOF'
          const { defineConfig } = require('@playwright/test');
          module.exports = defineConfig({
            testDir: './tests',
            timeout: 300000, 
            expect: { timeout: 15000 },
            use: {
              headless: false, 
              viewport: { width: 1366, height: 768 },
              screenshot: 'only-on-failure',
            },
            projects: [{ name: 'chromium' }]
          });
          EOF

      - name: Create Cart Action Test Script
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tests
          cat > tests/bol-cart.spec.js <<'EOF'
          const { test, expect } = require('@playwright/test');
          const { chromium } = require('playwright-extra');
          const StealthPlugin = require('puppeteer-extra-plugin-stealth');
          
          chromium.use(StealthPlugin());

          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');

          test('Bypass login and add Airtag to cart with Telegram screenshots', async () => {
            const screenshotDir = path.join(process.cwd(), 'cart-screenshots');
            fs.mkdirSync(screenshotDir, { recursive: true });
            let step = 1;

            const botToken = process.env.TELEGRAM_BOT_TOKEN;
            const chatId = process.env.TELEGRAM_CHAT_ID;

            const browserInstance = await chromium.launch({
              headless: false,
              args: ['--disable-blink-features=AutomationControlled']
            });

            const statePath = path.join(process.cwd(), 'state.json');
            let context;

            if (fs.existsSync(statePath)) {
              console.log('Found state.json! Loading previous session.');
              context = await browserInstance.newContext({
                storageState: statePath,
                locale: 'nl-NL',
                timezoneId: 'Europe/Amsterdam',
                extraHTTPHeaders: { 'Accept-Language': 'nl-NL,nl;q=0.9,en;q=0.8' }
              });
            } else {
              console.log('No state.json found. Running session without pre-auth.');
              context = await browserInstance.newContext({
                locale: 'nl-NL',
                timezoneId: 'Europe/Amsterdam',
                extraHTTPHeaders: { 'Accept-Language': 'nl-NL,nl;q=0.9,en;q=0.8' }
              });
            }

            const page = await context.newPage();
            page.setDefaultNavigationTimeout(15000);
            page.setDefaultTimeout(5000);

            async function snap(name) {
              const filename = `cart-${String(step).padStart(2, '0')}-${name}.png`;
              const file = path.join(screenshotDir, filename);
              try {
                await page.waitForTimeout(500); // Safety wait to prevent black/blank screenshots
                await page.screenshot({ path: file, fullPage: true, timeout: 3000 });
                console.log(`[CART STEP ${step}] Screenshot: ${file}`);
                
                if (botToken && chatId) {
                  execSync(`curl -s -F chat_id="${chatId}" -F photo="@${file}" -F caption="Cart Step: ${filename}" "https://api.telegram.org/bot${botToken}/sendPhoto"`, { stdio: 'ignore' });
                }
                step += 1;
              } catch (e) {
                console.log(`Failed to capture/send screenshot for step ${name}: ${e.message}`);
              }
            }

            try {
              console.log('Navigating directly to Apple AirTag page...');
              await page.goto('https://www.bol.com/nl/nl/p/apple-airtag-4-stuks/9300000035840899/', { waitUntil: 'domcontentloaded' });
              await snap('01-product-landed');
              
              const cookieBtn = page.locator('button:has-text("Accepteren"), button:has-text("Alles accepteren")').first();
              if (await cookieBtn.isVisible()) {
                console.log('Triggering Accept cookies...');
                await snap('02-before-cookie-click');
                await cookieBtn.click();
                await snap('03-after-cookie-click');
              }

              const buyButton = page.locator('a:has-text("In winkelwagen"), button:has-text("In winkelwagen"), [data-test="add-to-cart-button"]').first();
              await expect(buyButton).toBeVisible({ timeout: 5000 });
              
              console.log('Clicking to drop item into the cart...');
              await snap('04-before-add-to-cart');
              await buyButton.click();
              
              await page.waitForTimeout(3000); // Wait for cart drop flyout/animation to finish
              await snap('05-after-add-to-cart');

              console.log('Loading the shopping cart page for verification...');
              await page.goto('https://www.bol.com/nl/nl/winkelwagentje/');
              
              await page.waitForTimeout(2000); // Wait for basket values to update visually
              await snap('06-cart-overview-final');

              console.log('🎉 Item added successfully!');
              await browserInstance.close();
            } catch (err) {
              console.log(`⚠️ Process failed: ${err.message}`);
              await snap('07-error-break');
              await browserInstance.close();
              throw err;
            }
          });
          EOF

      - name: Run Playwright test
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
          PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
        run: xvfb-run npx playwright test

      - name: Upload Cart Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cart-screenshots
          path: cart-screenshots/
          retention-days: 7
