name: Bol - Update YAML and Commit

on:
  workflow_call:
    inputs:
      bol-email:
        required: true
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      BOL_EMAIL: ${{ inputs.bol-email }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Update registered-emails.yml
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          import yaml
          import os
          from datetime import datetime, timezone

          path = "data/registered-emails.yml"
          email = os.environ.get("BOL_EMAIL")

          with open(path, "r", encoding="utf-8") as f:
              data = yaml.safe_load(f) or []

          updated = False
          now_str = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')

          for entry in data:
              if entry.get("email") == email:
                  entry["used_to_login"] = True
                  entry["last_login_at"] = now_str
                  updated = True
                  break

          if updated:
              with open(path, "w", encoding="utf-8") as f:
                  yaml.dump(data, f, default_flow_style=False, sort_keys=False, allow_unicode=True)
          else:
              print(f"[WARN] No matching email found for {email}")
          PY

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/registered-emails.yml
          git diff --cached --quiet && exit 0
          git commit -m "Automated update: Locked out email ${{ inputs.bol-email }}"
          git push
