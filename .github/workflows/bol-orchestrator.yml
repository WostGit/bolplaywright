name: Playwright Bol Unified Flow - Orchestrator

on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  setup:
    uses: ./.github/workflows/bol-setup.yml
    secrets: inherit

  login:
    needs: setup
    uses: ./.github/workflows/bol-step-login.yml
    secrets: inherit
    with:
      bol-email: ${{ needs.setup.outputs.bol-email }}

  search-and-add-to-cart:
    needs: login
    uses: ./.github/workflows/bol-step-search-add-cart.yml
    secrets: inherit
    with:
      bol-email: ${{ needs.setup.outputs.bol-email }}

  go-to-order:
    needs: search-and-add-to-cart
    uses: ./.github/workflows/bol-step-go-to-order.yml
    secrets: inherit
    with:
      bol-email: ${{ needs.setup.outputs.bol-email }}

  check-order:
    needs: go-to-order
    uses: ./.github/workflows/bol-step-check-order.yml
    secrets: inherit
    with:
      bol-email: ${{ needs.setup.outputs.bol-email }}

  update-and-commit:
    needs: check-order
    uses: ./.github/workflows/bol-update-commit.yml
    secrets: inherit
    with:
      bol-email: ${{ needs.setup.outputs.bol-email }}
