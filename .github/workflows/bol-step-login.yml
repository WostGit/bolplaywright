name: "Bol - Step 1: Login"

on:
  workflow_call:
    inputs:
      bol-email:
        required: true
        type: string

jobs:
  login:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BOL_EMAIL: ${{ inputs.bol-email }}
      BOL_PASSWORD: ${{ secrets.BOL_PASSWORD }}
      PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
      PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
      PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies and Browsers
        run: |
          npm init -y
          npm install @playwright/test
          npx playwright install --with-deps chromium

      - name: Execute Login Step
        shell: bash
        run: |
          set -euo pipefail
          echo "================================================================="
          echo " STEP 1: LOGIN"
          echo "================================================================="

          cat > bol-login.spec.js <<'EOF'
          const { test, chromium, request } = require('@playwright/test');
          const fs = require('fs');
          const path = require('path');

          test('Bol Login', async () => {
            const email = process.env.BOL_EMAIL;
            const password = process.env.BOL_PASSWORD;
            const botToken = process.env.TELEGRAM_BOT_TOKEN;
            const chatId = process.env.TELEGRAM_CHAT_ID;

            async function sendTelegramAlert(filePath, caption) {
              if (!botToken || !chatId) return;
              try {
                const apiContext = await request.newContext();
                const buffer = fs.readFileSync(filePath);
                await apiContext.post(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                  multipart: {
                    chat_id: chatId,
                    caption: caption,
                    photo: {
                      name: path.basename(filePath),
                      mimeType: 'image/png',
                      buffer: buffer
                    }
                  }
                });
              } catch (e) {
                console.error('Telegram Error:', e.message);
              }
            }

            // Launching in headless mode is standard for CI
            const browser = await chromium.launch({ 
              headless: true, 
              args: ['--disable-blink-features=AutomationControlled'] 
            });
            
            const context = await browser.newContext({
              locale: 'nl-NL',
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
              proxy: process.env.PROXY_SERVER ? {
                server: process.env.PROXY_SERVER,
                username: process.env.PROXY_USERNAME,
                password: process.env.PROXY_PASSWORD
              } : undefined
            });
            
            const page = await context.newPage();
            page.setDefaultTimeout(40000);

            try {
              await page.goto('https://www.bol.com/nl/nl/', { waitUntil: 'domcontentloaded' });
              
              // Handle Cookies
              await page.getByRole('button', { name: /Accepteren|Alles accepteren/i }).click().catch(() => {});
              
              // Navigate to Login
              await page.getByRole('link', { name: /Inloggen/i }).first().click({ force: true });
              await page.waitForURL('**/login**');

              // Fill Credentials
              await page.getByRole('textbox', { name: 'E-mailadres' }).fill(email);
              await page.getByRole('textbox', { name: 'Wachtwoord' }).fill(password);

              const prepPath = 'login-credentials-filled.png';
              await page.screenshot({ path: prepPath });
              await sendTelegramAlert(prepPath, '[Step 1] Credentials filled');

              // Click Login
              await page.getByRole('button', { name: 'Inloggen' }).click();

              // Wait for success indicators
              await Promise.race([
                page.waitForURL('https://www.bol.com/nl/nl/**', { timeout: 30000 }),
                page.waitForURL('**/account/overzicht**', { timeout: 30000 })
              ]);

              await page.waitForLoadState('networkidle');
              await page.screenshot({ path: 'login-success.png' });
              await sendTelegramAlert('login-success.png', '✅ Login Successful');

              console.log('Login completed successfully');
            } catch (error) {
              const errPath = 'error-screenshot.png';
              await page.screenshot({ path: errPath });
              await sendTelegramAlert(errPath, `❌ Login Failed: ${error.message}`);
              throw error;
            } finally {
              await context.close();
              await browser.close();
            }
          });
          EOF

          # xvfb-run is only strictly necessary if headless: false
          npx playwright test bol-login.spec.js
