name: "Bol - Step 1: Login"

on:
  workflow_call:
    inputs:
      bol-email:
        required: true
        type: string

jobs:
  login:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      BOL_EMAIL: ${{ inputs.bol-email }}
      BOL_PASSWORD: ${{ secrets.BOL_PASSWORD }}
      PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
      PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
      PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DEBUG: pw:api

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies and Browsers
        shell: bash
        run: |
          set -euo pipefail
          npm init -y
          npm install @playwright/test
          npx playwright install --with-deps chromium

      - name: Proxy curl health check
        shell: bash
        run: |
          set -euo pipefail

          echo "============================================================"
          echo "PROXY CURL HEALTH CHECK"
          echo "============================================================"
          echo "PROXY_SERVER present: $([ -n "${PROXY_SERVER:-}" ] && echo yes || echo no)"
          echo "PROXY_USERNAME present: $([ -n "${PROXY_USERNAME:-}" ] && echo yes || echo no)"
          echo "PROXY_PASSWORD present: $([ -n "${PROXY_PASSWORD:-}" ] && echo yes || echo no)"

          curl -v \
            --proxy "${PROXY_SERVER}" \
            --proxy-user "${PROXY_USERNAME}:${PROXY_PASSWORD}" \
            --max-time 40 \
            https://example.com > /tmp/proxy-healthcheck-example.html

      - name: Execute Login Step
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p screenshots logs traces html-dumps

          cat > bol-login.spec.js <<'EOF'
          const { test, expect, chromium, request } = require('@playwright/test');
          const fs = require('fs');
          const path = require('path');

          test('Bol Login', async () => {
            test.setTimeout(240000);

            const email = process.env.BOL_EMAIL;
            const password = process.env.BOL_PASSWORD;
            const botToken = process.env.TELEGRAM_BOT_TOKEN;
            const chatId = process.env.TELEGRAM_CHAT_ID;
            const proxyServer = process.env.PROXY_SERVER?.trim();

            function normalizeProxyServer(proxyValue) {
              if (!proxyValue) return undefined;
              if (/^[a-zA-Z]+:\/\//.test(proxyValue)) {
                return proxyValue;
              }
              return `https://${proxyValue}`;
            }

            const normalizedProxy = normalizeProxyServer(proxyServer);

            function now() {
              return new Date().toISOString();
            }

            function logLine(message) {
              const line = `[${now()}] ${message}`;
              console.log(line);
              fs.appendFileSync('logs/login-debug.log', line + '\n');
            }

            async function sendTelegramAlert(filePath, caption) {
              if (!botToken || !chatId) return;
              try {
                const apiContext = await request.newContext();
                const buffer = fs.readFileSync(filePath);
                await apiContext.post(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                  multipart: {
                    chat_id: chatId,
                    caption,
                    photo: {
                      name: path.basename(filePath),
                      mimeType: 'image/png',
                      buffer
                    }
                  }
                });
                await apiContext.dispose();
              } catch (e) {
                logLine(`Telegram Error: ${e.message}`);
              }
            }

            async function snap(page, name, caption, fullPage = true) {
              const filePath = `screenshots/${name}.png`;
              fs.mkdirSync('screenshots', { recursive: true });
              try {
                await page.screenshot({ path: filePath, fullPage });
                logLine(`Screenshot saved: ${filePath}`);
                await sendTelegramAlert(filePath, caption);
              } catch (e) {
                logLine(`Screenshot failed for ${filePath}: ${e.message}`);
              }
            }

            async function dumpHtml(page, name) {
              const filePath = `html-dumps/${name}.html`;
              try {
                const html = await page.content();
                fs.writeFileSync(filePath, html, 'utf8');
                logLine(`HTML dumped: ${filePath}`);
              } catch (e) {
                logLine(`HTML dump failed for ${filePath}: ${e.message}`);
              }
            }

            async function dumpMeta(page, attempt, stage) {
              try {
                const meta = {
                  timestamp: now(),
                  attempt,
                  stage,
                  url: page.url(),
                  title: await page.title().catch(() => null),
                  proxyPresent: !!normalizedProxy,
                  proxyScheme: normalizedProxy ? normalizedProxy.split('://')[0] : null
                };
                const file = `logs/meta-attempt-${attempt}-${stage}.json`;
                fs.writeFileSync(file, JSON.stringify(meta, null, 2), 'utf8');
                logLine(`Meta dumped: ${file}`);
              } catch (e) {
                logLine(`Meta dump failed: ${e.message}`);
              }
            }

            function attachPageLogging(page, attempt) {
              page.on('request', req => {
                const url = req.url();
                if (/bol\.com|chrome-error|example\.com|telegram/i.test(url)) {
                  logLine(`[Attempt ${attempt}] REQUEST ${req.method()} ${url}`);
                }
              });

              page.on('response', res => {
                const url = res.url();
                if (/bol\.com|chrome-error|example\.com/i.test(url)) {
                  logLine(`[Attempt ${attempt}] RESPONSE ${res.status()} ${url}`);
                }
              });

              page.on('requestfailed', req => {
                const failure = req.failure();
                logLine(`[Attempt ${attempt}] REQUEST FAILED ${req.method()} ${req.url()} :: ${failure ? failure.errorText : 'unknown error'}`);
              });

              page.on('framenavigated', frame => {
                if (frame === page.mainFrame()) {
                  logLine(`[Attempt ${attempt}] MAIN FRAME NAVIGATED TO: ${frame.url()}`);
                }
              });

              page.on('pageerror', err => {
                logLine(`[Attempt ${attempt}] PAGE ERROR: ${err.message}`);
              });
            }

            async function testUrl(page, url, label, attempt) {
              try {
                logLine(`[Attempt ${attempt}] [HEALTHCHECK] Opening ${label}: ${url}`);
                const response = await page.goto(url, {
                  waitUntil: 'domcontentloaded',
                  timeout: 30000
                });
                logLine(`[Attempt ${attempt}] [HEALTHCHECK] ${label} success. Final URL=${page.url()} status=${response ? response.status() : 'no-response'}`);
                await snap(page, `healthcheck-${label}-attempt-${attempt}`, `[Step 1][Attempt ${attempt}] Healthcheck ok: ${label}`);
                return true;
              } catch (e) {
                logLine(`[Attempt ${attempt}] [HEALTHCHECK] ${label} failed: ${e.message}`);
                await snap(page, `healthcheck-${label}-failed-attempt-${attempt}`, `[Step 1][Attempt ${attempt}] Healthcheck failed: ${label}`);
                return false;
              }
            }

            async function detectPostLoginOutcome(page, attempt) {
              logLine(`[Attempt ${attempt}] Monitoring post-login outcome`);

              const outcome = await Promise.race([
                page.waitForURL(/account|mijnbol|overzicht|bestellen|checkout/i, { timeout: 45000 })
                  .then(() => 'success-url'),

                page.locator('text=/captcha|beveiligingscontrole|verify|verificatie|robot/i')
                  .waitFor({ timeout: 45000 })
                  .then(() => 'captcha')
                  .catch(() => null),

                page.locator('text=/mijn account|accountoverzicht|bestellingen/i')
                  .waitFor({ timeout: 45000 })
                  .then(() => 'success-content')
                  .catch(() => null),

                page.locator('text=/inloggen mislukt|onjuiste|probeer opnieuw|wachtwoord|e-mailadres/i')
                  .waitFor({ timeout: 45000 })
                  .then(() => 'login-page-still-visible')
                  .catch(() => null)
              ]);

              logLine(`[Attempt ${attempt}] Post-login outcome: ${outcome || 'unknown'}`);
              logLine(`[Attempt ${attempt}] Current URL after submit: ${page.url()}`);

              await dumpMeta(page, attempt, 'post-login-outcome');
              await dumpHtml(page, `attempt-${attempt}-post-login-outcome`);
              await snap(page, `06-post-login-outcome-attempt-${attempt}`, `[Step 1][Attempt ${attempt}] Post-login outcome: ${outcome || 'unknown'} | URL: ${page.url()}`);

              if (outcome === 'captcha') {
                throw new Error(`CAPTCHA or verification detected after login. URL: ${page.url()}`);
              }

              if (outcome === 'login-page-still-visible') {
                throw new Error(`Still on login page after submit. URL: ${page.url()}`);
              }

              if (!outcome) {
                throw new Error(`No post-login outcome detected within timeout. URL: ${page.url()}`);
              }

              return outcome;
            }

            async function tryLogin(attempt) {
              logLine(`============================================================`);
              logLine(`Starting login attempt ${attempt}`);
              logLine(`BOL_EMAIL present: ${email ? 'yes' : 'no'}`);
              logLine(`BOL_PASSWORD present: ${password ? 'yes' : 'no'}`);
              logLine(`PROXY_SERVER present: ${proxyServer ? 'yes' : 'no'}`);
              logLine(`PROXY_USERNAME present: ${process.env.PROXY_USERNAME ? 'yes' : 'no'}`);
              logLine(`PROXY_PASSWORD present: ${process.env.PROXY_PASSWORD ? 'yes' : 'no'}`);
              if (normalizedProxy) {
                logLine(`PROXY scheme: ${normalizedProxy.split('://')[0]}`);
              }
              logLine(`TELEGRAM enabled: ${botToken && chatId ? 'yes' : 'no'}`);
              logLine(`============================================================`);

              const browser = await chromium.launch({
                headless: true,
                args: [
                  '--disable-blink-features=AutomationControlled',
                  '--disable-dev-shm-usage',
                  '--no-sandbox',
                  '--disable-gpu'
                ]
              });

              const context = await browser.newContext({
                locale: 'nl-NL',
                viewport: { width: 1366, height: 768 },
                ignoreHTTPSErrors: false,
                recordVideo: { dir: 'traces/' },
                userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
                proxy: normalizedProxy ? {
                  server: normalizedProxy,
                  username: process.env.PROXY_USERNAME,
                  password: process.env.PROXY_PASSWORD
                } : undefined
              });

              await context.tracing.start({ screenshots: true, snapshots: true, sources: true });

              const page = await context.newPage();
              attachPageLogging(page, attempt);

              page.setDefaultTimeout(30000);
              page.setDefaultNavigationTimeout(60000);

              try {
                await testUrl(page, 'https://example.com', 'example', attempt);

                logLine(`[Attempt ${attempt}] Navigating to home page`);
                await page.goto('https://www.bol.com/nl/nl/', {
                  waitUntil: 'domcontentloaded',
                  timeout: 60000
                });

                await dumpMeta(page, attempt, 'after-home-goto');
                await dumpHtml(page, `attempt-${attempt}-after-home-goto`);
                await snap(page, `01-home-attempt-${attempt}`, `[Step 1][Attempt ${attempt}] Home page loaded`);

                if (page.url().startsWith('chrome-error://')) {
                  throw new Error(`Landed on browser error page after home navigation: ${page.url()}`);
                }

                await page.getByRole('button', { name: /Accepteren|Alles accepteren/i }).click().catch(() => {});
                await snap(page, `02-cookies-attempt-${attempt}`, `[Step 1][Attempt ${attempt}] Cookies handled`);

                const loginLink = page.getByRole('link', { name: /Inloggen/i }).first();
                await expect(loginLink).toBeVisible({ timeout: 15000 });
                await loginLink.click({ force: true });

                await page.waitForURL(/login/i, { timeout: 30000 });
                await dumpMeta(page, attempt, 'login-page');
                await dumpHtml(page, `attempt-${attempt}-login-page`);
                await snap(page, `03-login-page-attempt-${attempt}`, `[Step 1][Attempt ${attempt}] Login page opened`);

                const emailBox = page.getByRole('textbox', { name: /E-mailadres/i });
                const passwordBox = page.getByRole('textbox', { name: /Wachtwoord/i });

                await expect(emailBox).toBeVisible({ timeout: 15000 });
                await expect(passwordBox).toBeVisible({ timeout: 15000 });

                await emailBox.fill(email);
                await snap(page, `04-email-filled-attempt-${attempt}`, `[Step 1][Attempt ${attempt}] Email filled`);

                await passwordBox.fill(password);
                await snap(page, `05-password-filled-attempt-${attempt}`, `[Step 1][Attempt ${attempt}] Password filled`);

                const loginButton = page.getByRole('button', { name: /^Inloggen$/i });
                await expect(loginButton).toBeVisible({ timeout: 15000 });
                await loginButton.click();
                await snap(page, `06-login-submitted-attempt-${attempt}`, `[Step 1][Attempt ${attempt}] Login submitted`);

                await detectPostLoginOutcome(page, attempt);

                await page.waitForTimeout(3000);
                await dumpMeta(page, attempt, 'login-success');
                await dumpHtml(page, `attempt-${attempt}-login-success`);
                await snap(page, `07-login-success-attempt-${attempt}`, `✅ [Step 1][Attempt ${attempt}] Login successful`);

                await context.storageState({ path: 'storage-state.json' });
                await context.tracing.stop({ path: `traces/login-attempt-${attempt}-success-trace.zip` });

                await context.close();
                await browser.close();
                return true;
              } catch (error) {
                const message = String(error && error.message ? error.message : error);
                logLine(`[Attempt ${attempt}] LOGIN FAILURE: ${message}`);

                await dumpMeta(page, attempt, 'login-error');
                await dumpHtml(page, `attempt-${attempt}-login-error`);
                await snap(page, `99-login-error-attempt-${attempt}`, `❌ [Step 1][Attempt ${attempt}] Login failed: ${message}`);

                try {
                  await context.tracing.stop({ path: `traces/login-attempt-${attempt}-error-trace.zip` });
                } catch {}

                await context.close().catch(() => {});
                await browser.close().catch(() => {});
                return false;
              }
            }

            let success = false;
            const maxAttempts = 3;
            const backoffs = [5000, 10000, 15000];

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              logLine(`Starting login attempt ${attempt} of ${maxAttempts}`);
              success = await tryLogin(attempt);
              if (success) {
                logLine(`Login attempt ${attempt} succeeded`);
                break;
              }

              if (attempt < maxAttempts) {
                logLine(`Login attempt ${attempt} failed, sleeping ${backoffs[attempt - 1]}ms before retry`);
                await new Promise(resolve => setTimeout(resolve, backoffs[attempt - 1]));
              }
            }

            if (!success) {
              logLine(`All login attempts failed`);
              throw new Error(`Login failed after ${maxAttempts} attempts`);
            }
          });
          EOF

          npx playwright test bol-login.spec.js --reporter=line 2>&1 | tee logs/playwright-run.log

      - name: Upload auth state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bol-auth-state
          path: storage-state.json
          if-no-files-found: ignore

      - name: Upload login screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bol-login-screenshots
          path: screenshots/
          if-no-files-found: ignore

      - name: Upload login logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bol-login-logs
          path: logs/
          if-no-files-found: ignore

      - name: Upload login traces and videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bol-login-traces
          path: traces/
          if-no-files-found: ignore

      - name: Upload login HTML dumps
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bol-login-html-dumps
          path: html-dumps/
          if-no-files-found: ignore
