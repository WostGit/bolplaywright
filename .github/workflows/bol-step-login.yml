name: "Bol - Step 1: Login"

on:
  workflow_call:
    inputs:
      bol-email:
        required: true
        type: string

jobs:
  login:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BOL_EMAIL: ${{ inputs.bol-email }}
      BOL_PASSWORD: ${{ secrets.BOL_PASSWORD }}
      PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
      PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
      PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies and Browsers
        run: |
          npm init -y
          npm install @playwright/test
          npx playwright install --with-deps chromium

      - name: Execute Login Step
        shell: bash
        run: |
          set -euo pipefail

          cat > bol-login.spec.js <<'EOF'
          const { test, expect, chromium, request } = require('@playwright/test');
          const fs = require('fs');
          const path = require('path');

          test('Bol Login', async () => {
            const email = process.env.BOL_EMAIL;
            const password = process.env.BOL_PASSWORD;
            const botToken = process.env.TELEGRAM_BOT_TOKEN;
            const chatId = process.env.TELEGRAM_CHAT_ID;

            async function sendTelegramAlert(filePath, caption) {
              if (!botToken || !chatId) return;
              try {
                const apiContext = await request.newContext();
                const buffer = fs.readFileSync(filePath);
                await apiContext.post(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                  multipart: {
                    chat_id: chatId,
                    caption,
                    photo: {
                      name: path.basename(filePath),
                      mimeType: 'image/png',
                      buffer
                    }
                  }
                });
                await apiContext.dispose();
              } catch (e) {
                console.error('Telegram Error:', e.message);
              }
            }

            async function snap(page, name, caption, fullPage = true) {
              const filePath = `screenshots/${name}.png`;
              fs.mkdirSync('screenshots', { recursive: true });
              await page.screenshot({ path: filePath, fullPage });
              await sendTelegramAlert(filePath, caption);
            }

            const browser = await chromium.launch({
              headless: true,
              args: ['--disable-blink-features=AutomationControlled']
            });

            const context = await browser.newContext({
              locale: 'nl-NL',
              viewport: { width: 1366, height: 768 },
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
              proxy: process.env.PROXY_SERVER ? {
                server: process.env.PROXY_SERVER,
                username: process.env.PROXY_USERNAME,
                password: process.env.PROXY_PASSWORD
              } : undefined
            });

            const page = await context.newPage();
            page.setDefaultTimeout(40000);

            try {
              await page.goto('https://www.bol.com/nl/nl/', { waitUntil: 'domcontentloaded' });
              await snap(page, '01-home', '[Step 1] Home page loaded');

              await page.getByRole('button', { name: /Accepteren|Alles accepteren/i }).click().catch(() => {});
              await snap(page, '02-cookies', '[Step 1] Cookies handled');

              await page.getByRole('link', { name: /Inloggen/i }).first().click({ force: true });
              await page.waitForURL(/login/i, { timeout: 30000 });
              await snap(page, '03-login-page', '[Step 1] Login page opened');

              await page.getByRole('textbox', { name: /E-mailadres/i }).fill(email);
              await snap(page, '04-email-filled', '[Step 1] Email filled');

              await page.getByRole('textbox', { name: /Wachtwoord/i }).fill(password);
              // Intentionally no screenshot here to avoid sending password-filled screens.

              await page.getByRole('button', { name: /^Inloggen$/i }).click();
              await snap(page, '05-login-submitted', '[Step 1] Login submitted');

              await Promise.race([
                page.waitForURL('https://www.bol.com/nl/nl/**', { timeout: 30000 }),
                page.waitForURL('**/account/overzicht**', { timeout: 30000 }),
                page.waitForURL('**/mijnbol/**', { timeout: 30000 })
              ]);

              await page.waitForLoadState('networkidle');
              await snap(page, '06-login-success', '✅ [Step 1] Login successful');

              await context.storageState({ path: 'storage-state.json' });
              console.log('Login completed successfully and storage state saved');
            } catch (error) {
              await snap(page, '99-login-error', `❌ [Step 1] Login failed: ${error.message}`);
              throw error;
            } finally {
              await context.close();
              await browser.close();
            }
          });
          EOF

          npx playwright test bol-login.spec.js

      - name: Upload auth state
        uses: actions/upload-artifact@v4
        with:
          name: bol-auth-state
          path: storage-state.json
          if-no-files-found: error

      - name: Upload login screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bol-login-screenshots
          path: screenshots/
          if-no-files-found: ignore
