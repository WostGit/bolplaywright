name: Playwright Bol Login Only
on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # THIS IS THE CRITICAL HANDOFF RECEIVER
  repository_dispatch:
    types: [registration_complete]
    
permissions:
  contents: write

jobs:
  playwright-login:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      BOL_PASSWORD: ${{ secrets.BOL_PASSWORD }}
      PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
      PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
      PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$PROXY_SERVER" || { echo "Missing secret PROXY_SERVER"; exit 1; }
          test -n "$PROXY_USERNAME" || { echo "Missing secret PROXY_USERNAME"; exit 1; }
          test -n "$PROXY_PASSWORD" || { echo "Missing secret PROXY_PASSWORD"; exit 1; }
          test -n "$BOL_PASSWORD" || { echo "Missing secret BOL_PASSWORD"; exit 1; }

      # FIXED: Removed cache: 'npm' to stop the lockfile missing error
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Extract email for login
        id: get-email
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          import yaml
          import os

          path = "data/registered-emails.yml"
          if not os.path.exists(path):
              print("No registration file found! Exiting.")
              exit(1)

          with open(path, "r", encoding="utf-8") as f:
              data = yaml.safe_load(f) or []

          target_account = None
          for entry in data:
              if not entry.get("used_to_login", False):
                  target_account = entry
                  break

          if not target_account:
              print("No unused accounts available for login!")
              exit(1)

          email = target_account["email"]
          print(f"Found account for login: {email}")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"BOL_EMAIL={email}\n")
          PY

      - name: Create package.json
        shell: bash
        run: |
          set -euo pipefail
          cat > package.json <<'EOF'
          {
            "name": "playwright-bol-login-only",
            "private": true,
            "devDependencies": {
              "@playwright/test": "^1.54.0",
              "playwright-extra": "^4.3.6",
              "puppeteer-extra-plugin-stealth": "^2.11.2"
            }
          }
          EOF

      - name: Install Node dependencies
        shell: bash
        run: npm install

      # We keep the custom browser cache because it falls back gracefully if it finds nothing
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        shell: bash
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        shell: bash
        run: npx playwright install-deps chromium

      - name: Create Playwright config
        shell: bash
        run: |
          set -euo pipefail
          cat > playwright.config.js <<'EOF'
          const { defineConfig } = require('@playwright/test');
          module.exports = defineConfig({
            testDir: './tests',
            timeout: 300000, 
            expect: { timeout: 15000 },
            retries: 0, 
            reporter: [['html', { open: 'never' }], ['list']],
            use: {
              headless: false, 
              viewport: { width: 1366, height: 768 },
              screenshot: 'only-on-failure',
              trace: 'retain-on-failure',
              video: 'retain-on-failure'
            },
            projects: [
              {
                name: 'chromium'
              }
            ]
          });
          EOF

      - name: Create Playwright test
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tests
          cat > tests/bol-login.spec.js <<'EOF'
          const { test, expect } = require('@playwright/test');
          
          const { chromium } = require('playwright-extra');
          const StealthPlugin = require('puppeteer-extra-plugin-stealth');
          
          chromium.use(StealthPlugin());

          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');

          test('login only and verify success', async () => {
            const screenshotDir = path.join(process.cwd(), 'login-screenshots');
            fs.mkdirSync(screenshotDir, { recursive: true });
            let step = 1;

            const email = process.env.BOL_EMAIL;
            const password = process.env.BOL_PASSWORD;
            const botToken = process.env.TELEGRAM_BOT_TOKEN;
            const chatId = process.env.TELEGRAM_CHAT_ID;

            console.log('--- LOGIN TEST START ---');
            console.log(`Target Email: ${email}`);

            if (!email || !password) {
              throw new Error("Missing BOL_EMAIL or BOL_PASSWORD environment variables.");
            }

            const maxAttempts = 5; 
            let success = false;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              console.log(`\nStarting Attempt ${attempt} of ${maxAttempts}...`);
              
              const browserInstance = await chromium.launch({
                headless: false,
                args: ['--disable-blink-features=AutomationControlled']
              });

              const context = await browserInstance.newContext({
                locale: 'nl-NL',
                timezoneId: 'Europe/Amsterdam',
                extraHTTPHeaders: {
                  'Accept-Language': 'nl-NL,nl;q=0.9,en;q=0.8'
                },
                proxy: {
                  server: process.env.PROXY_SERVER,
                  username: process.env.PROXY_USERNAME,
                  password: process.env.PROXY_PASSWORD
                }
              });
              
              const page = await context.newPage();
              
              page.setDefaultNavigationTimeout(10000); 
              page.setDefaultTimeout(4000);

              async function snap(name) {
                const filename = `attempt${attempt}-${String(step).padStart(2, '0')}-${name}.png`;
                const file = path.join(screenshotDir, filename);
                try {
                  await page.screenshot({ path: file, fullPage: true, timeout: 3000 });
                  console.log(`[STEP ${step}] Screenshot saved: ${file}`);
                  
                  if (botToken && chatId) {
                    console.log(`[STEP ${step}] Sending ${filename} to Telegram...`);
                    try {
                      execSync(`curl -s -F chat_id="${chatId}" -F photo="@${file}" -F caption="Step: ${filename}" "https://api.telegram.org/bot${botToken}/sendPhoto"`, { stdio: 'ignore' });
                    } catch (telegramErr) {
                      console.log(`[STEP ${step}] Telegram dispatch failed.`);
                    }
                  }
                  step += 1;
                  return file;
                } catch (e) {
                  console.log(`[STEP ${step}] Screenshot failed: ${e.message}`);
                }
              }

              try {
                console.log('Navigating to bol.com homepage...');
                await page.goto('https://www.bol.com/nl/nl/', { waitUntil: 'domcontentloaded' });
                
                const bodyText = await page.innerText('body');
                if (bodyText.includes('captcha') || bodyText.includes('robot') || bodyText.includes('unusual traffic')) {
                  console.log('⚠️ Block detected on homepage! Recycling proxy...');
                  await browserInstance.close();
                  continue; 
                }

                const cookieBtn = page.locator('button:has-text("Accepteren"), button:has-text("Alles accepteren")').first();
                if (await cookieBtn.isVisible()) {
                  console.log('Cookie banner detected. Clicking accept...');
                  await cookieBtn.click();
                }
                await snap('after-cookies');

                console.log('Looking for storefront login button...');
                const navLoginBtn = page.locator('a:has-text("Inloggen"), button:has-text("Inloggen"), [data-test="login-link"]').first();
                await navLoginBtn.click();
                
                await page.waitForURL('**/wsp/login**', { timeout: 10000 });
                await snap('login-page-loaded');

                const emailInput = page.locator('input#username, input[name="j_username"]').first();
                await emailInput.waitFor({ state: 'visible', timeout: 5000 });
                
                console.log('Filling email...');
                await emailInput.fill(email);

                const passwordInput = page.locator('input#password, input[name="j_password"]').first();
                console.log('Filling password...');
                await passwordInput.fill(password);
                
                await snap('credentials-filled');

                const loginBtn = page.locator('button#submit, button[type="SUBMIT"]:has-text("Inloggen")').first();
                await loginBtn.click();
                
                await page.waitForTimeout(4000);
                await snap('after-login-attempt');

                const currentUrl = page.url();
                console.log(`Current URL after login attempt: ${currentUrl}`);
                
                if (currentUrl.includes('/wsp/login')) {
                    console.log('❌ Still on login page. Retrying with new proxy...');
                    await browserInstance.close();
                    continue;
                }

                console.log('🎉 SUCCESS: Navigated away from login page! Saving storage state...');
                await context.storageState({ path: 'state.json' });

                success = true;
                await browserInstance.close();
                break; 

              } catch (err) {
                console.log(`⚠️ Attempt ${attempt} encountered an error or timeout: ${err.message}`);
                await browserInstance.close(); 
                if (attempt === maxAttempts) throw err; 
                await new Promise(resolve => setTimeout(resolve, 500));
              }
            }

            if (!success) {
              throw new Error('Failed to log in after max proxy rotation attempts.');
            }
            console.log('--- LOGIN TEST END ---');
          });
          EOF

      - name: Run Playwright test
        id: playwright
        shell: bash
        run: xvfb-run npx playwright test

      - name: Update YAML file on successful login
        if: steps.playwright.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          import yaml
          import os
          from datetime import datetime, timezone

          path = "data/registered-emails.yml"
          email = os.environ.get("BOL_EMAIL")

          with open(path, "r", encoding="utf-8") as f:
              data = yaml.safe_load(f) or []

          updated = False
          now_str = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')
          
          for entry in data:
              if entry.get("email") == email:
                  entry["used_to_login"] = True
                  entry["last_login_at"] = now_str
                  updated = True
                  break

          if updated:
              with open(path, "w", encoding="utf-8") as f:
                  yaml.dump(data, f, default_flow_style=False, sort_keys=False, allow_unicode=True)
          PY

      - name: Commit updated email list
        if: steps.playwright.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/registered-emails.yml
          git diff --cached --quiet && exit 0
          git commit -m "Update last login timestamp for $BOL_EMAIL"
          git push

      - name: Send Telegram success message
        if: steps.playwright.outcome == 'success' && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        shell: bash
        run: |
          set -euo pipefail
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="bol login succeeded%0ARepo: ${{ github.repository }}%0AEmail: ${BOL_EMAIL}"

      - name: Send Telegram failure message
        if: steps.playwright.outcome != 'success' && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        shell: bash
        run: |
          set -euo pipefail
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="bol login failed%0ARun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Upload Auth State
        if: steps.playwright.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-state
          path: state.json
          retention-days: 1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-login-report
          path: playwright-report/
          retention-days: 14

  trigger-ordering:
    needs: playwright-login 
    if: success() 
    uses: ./.github/workflows/order.yml
    secrets: inherit
