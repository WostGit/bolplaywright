name: Playwright Bol Login Only
on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  playwright-login:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      BOL_PASSWORD: ${{ secrets.BOL_PASSWORD }}
      PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
      PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
      PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$PROXY_SERVER" || { echo "Missing secret PROXY_SERVER"; exit 1; }
          test -n "$PROXY_USERNAME" || { echo "Missing secret PROXY_USERNAME"; exit 1; }
          test -n "$PROXY_PASSWORD" || { echo "Missing secret PROXY_PASSWORD"; exit 1; }
          test -n "$BOL_PASSWORD" || { echo "Missing secret BOL_PASSWORD"; exit 1; }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Extract email for login
        id: get-email
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          import yaml
          import os

          path = "data/registered-emails.yml"
          if not os.path.exists(path):
              print("No registration file found! Exiting.")
              exit(1)

          with open(path, "r", encoding="utf-8") as f:
              data = yaml.safe_load(f) or []

          # Find the first account that hasn't been used to log in yet
          target_account = None
          for entry in data:
              if not entry.get("used_to_login", False):
                  target_account = entry
                  break

          if not target_account:
              print("No unused accounts available for login!")
              exit(1)

          email = target_account["email"]
          print(f"Found account for login: {email}")

          # Export it to GITHUB_ENV for Playwright and subsequent steps
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"BOL_EMAIL={email}\n")
          PY

      - name: Create package.json
        shell: bash
        run: |
          set -euo pipefail
          cat > package.json <<'EOF'
          {
            "name": "playwright-bol-login-only",
            "private": true,
            "devDependencies": {
              "@playwright/test": "^1.54.0"
            }
          }
          EOF

      - name: Install Node dependencies
        shell: bash
        run: npm install

      - name: Install Playwright Chromium
        shell: bash
        run: npx playwright install --with-deps chromium

      - name: Create Playwright config
        shell: bash
        run: |
          set -euo pipefail
          cat > playwright.config.js <<'EOF'
          const { defineConfig, devices } = require('@playwright/test');
          module.exports = defineConfig({
            testDir: './tests',
            timeout: 120000,
            expect: { timeout: 15000 },
            retries: process.env.CI ? 1 : 0,
            reporter: [['html', { open: 'never' }], ['list']],
            use: {
              headless: true,
              locale: 'nl-NL',
              timezoneId: 'Europe/Amsterdam',
              viewport: { width: 1366, height: 768 },
              colorScheme: 'light',
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/133.0.0.0 Safari/537.36',
              extraHTTPHeaders: {
                'Accept-Language': 'nl-NL,nl;q=0.9,en;q=0.8'
              },
              screenshot: 'only-on-failure',
              trace: 'retain-on-failure',
              video: 'retain-on-failure',
              proxy: {
                server: process.env.PROXY_SERVER,
                username: process.env.PROXY_USERNAME,
                password: process.env.PROXY_PASSWORD
              }
            },
            projects: [
              {
                name: 'chromium',
                use: { ...devices['Desktop Chrome'] }
              }
            ]
          });
          EOF

      - name: Create Playwright test
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tests
          cat > tests/bol-login.spec.js <<'EOF'
          const { test, expect } = require('@playwright/test');
          const fs = require('fs');
          const path = require('path');

          test('login only and verify success', async ({ page }, testInfo) => {
            const screenshotDir = path.join(testInfo.outputDir, 'login-screenshots');
            fs.mkdirSync(screenshotDir, { recursive: true });
            let step = 1;

            async function snap(name) {
              const file = path.join(screenshotDir, `${String(step).padStart(2, '0')}-${name}.png`);
              await page.screenshot({ path: file, fullPage: true });
              console.log(`[STEP ${step}] Screenshot saved: ${file}`);
              step += 1;
              return file;
            }

            const email = process.env.BOL_EMAIL;
            const password = process.env.BOL_PASSWORD;

            console.log('--- LOGIN TEST START ---');
            console.log(`Target Email: ${email}`);

            if (!email || !password) {
              throw new Error("Missing BOL_EMAIL or BOL_PASSWORD environment variables.");
            }

            // 1. Navigation
            console.log('Navigating to bol.com login page...');
            await page.goto('https://login.bol.com/wsp/login', { waitUntil: 'domcontentloaded', timeout: 45000 });
            await page.waitForTimeout(2000); 
            await snap('opened-login-page');

            // 2. Cookie handling
            console.log('Checking for cookie consent buttons...');
            const cookieBtn = page.locator('button:has-text("Accepteren"), button:has-text("Alles accepteren")').first();
            try {
              if (await cookieBtn.isVisible({ timeout: 3000 })) {
                console.log('Cookie banner detected. Clicking accept...');
                await cookieBtn.click();
                await page.waitForTimeout(1000);
              } else {
                console.log('No cookie banner visible within timeout.');
              }
            } catch (err) {
              console.log(`Cookie handling skipped or errored: ${err.message}`);
            }
            await snap('after-cookies');

            // 3. Form Interaction (Using targeted IDs/names from your HTML trace)
            console.log('Looking for email and password fields...');
            
            const emailInput = page.locator('input#username, input[name="j_username"]').first();
            const passwordInput = page.locator('input#password, input[name="j_password"]').first();

            console.log('Waiting for email input to be visible...');
            await expect(emailInput).toBeVisible({ timeout: 15000 });
            
            console.log('Filling credentials...');
            await emailInput.fill(email);
            await passwordInput.fill(password);
            console.log('Credentials filled successfully.');
            await snap('credentials-filled');

            // 4. Click login
            console.log('Looking for the submit button...');
            const loginBtn = page.locator('button#submit, button[type="SUBMIT"]:has-text("Inloggen")').first();
            
            console.log('Clicking the login button...');
            await loginBtn.click();
            
            console.log('Waiting 6 seconds for navigation or errors to appear...');
            await page.waitForTimeout(6000);
            await snap('after-login-attempt');

            // 5. Verify outcomes
            console.log('Analyzing result page...');
            
            // Check for immediate inline errors on the page
            const errorElement = page.locator('[aria-live="assertive"], [class*="error"]').first();
            if (await errorElement.isVisible({ timeout: 1000 })) {
                const errorText = await errorElement.innerText();
                console.log(`❌ FAILED: Found error text on page: "${errorText}"`);
                throw new Error(`Login failed with error on page: ${errorText}`);
            }

            // Fallback check: Are we still on the login URL?
            const currentUrl = page.url();
            console.log(`Current URL after login attempt: ${currentUrl}`);
            
            if (currentUrl.includes('/wsp/login')) {
                console.log('❌ FAILED: Browser is still on the login page. Authentication likely failed.');
                throw new Error('Login failed: Still on the login page.');
            }

            console.log('🎉 SUCCESS: Navigated away from login page. Assuming success!');
            console.log('--- LOGIN TEST END ---');
          });
          EOF

      - name: Run Playwright test
        shell: bash
        run: npx playwright test

      - name: Update YAML file on successful login
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          import yaml
          import os
          from datetime import datetime

          path = "data/registered-emails.yml"
          email = os.environ.get("BOL_EMAIL")

          if not email:
              print("No email variable found. Skipping update.")
              exit(1)

          with open(path, "r", encoding="utf-8") as f:
              data = yaml.safe_load(f) or []

          # Update the account that was just used
          updated = False
          now_str = datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S UTC')
          
          for entry in data:
              if entry.get("email") == email:
                  entry["used_to_login"] = True
                  entry["last_login_at"] = now_str
                  updated = True
                  break

          if updated:
              with open(path, "w", encoding="utf-8") as f:
                  yaml.dump(data, f, default_flow_style=False, sort_keys=False, allow_unicode=True)
              print(f"Successfully updated {email} in YAML file.")
          else:
              print(f"Failed to find {email} in registration list.")
              exit(1)
          PY

      - name: Commit updated email list
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/registered-emails.yml
          git diff --cached --quiet && exit 0
          git commit -m "Update last login timestamp for $BOL_EMAIL"
          git push

      - name: Send Telegram success message
        if: success() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        shell: bash
        run: |
          set -euo pipefail
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="bol login succeeded%0ARepo: ${{ github.repository }}%0AEmail: ${BOL_EMAIL}"

      - name: Send Telegram failure message
        if: failure() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        shell: bash
        run: |
          set -euo pipefail
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="bol login failed%0ARepo: ${{ github.repository }}%0ARun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}%0AEmail: ${BOL_EMAIL}"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-login-report
          path: playwright-report/
          retention-days: 14
