name: "Bol - Step 4: Select Budbee Delivery Option"

on:
  workflow_call:
    inputs:
      bol-email:
        required: true
        type: string

jobs:
  check-order:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
      PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
      PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download auth state
        uses: actions/download-artifact@v4
        with:
          name: bol-auth-state

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm init -y
          npm install @playwright/test
          npx playwright install --with-deps chromium

      - name: Execute Budbee Selection Step
        shell: bash
        run: |
          set -euo pipefail

          cat > bol-check-order.spec.js <<'EOF'
          const { test, expect, chromium, request } = require('@playwright/test');
          const fs = require('fs');
          const path = require('path');

          test('Select Budbee delivery option', async () => {
            test.setTimeout(120000);

            const botToken = process.env.TELEGRAM_BOT_TOKEN;
            const chatId = process.env.TELEGRAM_CHAT_ID;

            async function sendTelegramAlert(filePath, caption) {
              if (!botToken || !chatId) return;
              try {
                const apiContext = await request.newContext();
                const buffer = fs.readFileSync(filePath);
                await apiContext.post(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                  multipart: {
                    chat_id: chatId,
                    caption,
                    photo: {
                      name: path.basename(filePath),
                      mimeType: 'image/png',
                      buffer
                    }
                  }
                });
                await apiContext.dispose();
              } catch (e) {
                console.error('Telegram Error:', e.message);
              }
            }

            async function snap(page, name, caption, fullPage = true) {
              const filePath = `screenshots/${name}.png`;
              fs.mkdirSync('screenshots', { recursive: true });
              await page.screenshot({ path: filePath, fullPage });
              await sendTelegramAlert(filePath, caption);
            }

            const browser = await chromium.launch({ headless: true });

            const context = await browser.newContext({
              viewport: { width: 1366, height: 768 },
              storageState: 'storage-state.json',
              proxy: process.env.PROXY_SERVER ? {
                server: process.env.PROXY_SERVER,
                username: process.env.PROXY_USERNAME,
                password: process.env.PROXY_PASSWORD
              } : undefined
            });

            const page = await context.newPage();
            page.setDefaultTimeout(30000);
            page.setDefaultNavigationTimeout(60000);

            try {
              await page.goto('https://www.bol.com/nl/nl/checkout/', {
                waitUntil: 'domcontentloaded',
                timeout: 60000
              }).catch(async () => {
                await page.goto('https://www.bol.com/nl/nl/basket/', {
                  waitUntil: 'domcontentloaded',
                  timeout: 60000
                });
              });

              await snap(page, '01-checkout-opened', `[Step 4] Checkout opened: ${page.url()}`);

              if (/login/i.test(page.url())) {
                throw new Error(`Redirected to login page. Auth state missing or expired. URL: ${page.url()}`);
              }

              await page.getByRole('button', { name: /Accepteren|Alles accepteren/i }).click().catch(() => {});
              await snap(page, '02-cookies-handled', '[Step 4] Cookies handled');

              const otherAddressBtn = page.getByRole('button', { name: /^Ander bezorgadres of afhaalpunt$/i });
              await expect(otherAddressBtn).toBeVisible({ timeout: 20000 });
              await otherAddressBtn.click();

              await snap(page, '03-opened-dialog', '[Step 4] Opened delivery-point dialog');

              const dialog = page.locator('[role="dialog"]').filter({ hasText: /Je bezorgadressen/i }).first();
              await expect(dialog).toBeVisible({ timeout: 20000 });

              const pickupTab = dialog.getByRole('tab', { name: /^Afhaalpunten$/i });
              await expect(pickupTab).toBeVisible({ timeout: 10000 });

              const selected = await pickupTab.getAttribute('aria-selected');
              if (selected !== 'true') {
                await pickupTab.click();
              }

              await snap(page, '04-pickup-tab-active', '[Step 4] Afhaalpunten tab active');

              const activePanel = dialog.locator('[role="tabpanel"][data-state="active"]').first();
              await expect(activePanel).toBeVisible({ timeout: 10000 });

              // Budbee entries appear as li ids starting with BUNUR
              // PostNL entries appear as li ids starting with PNL
              const enabledBudbeeButtons = activePanel.locator('li[id^="BUNUR"] > button:not([disabled])');

              const budbeeCount = await enabledBudbeeButtons.count();
              if (budbeeCount === 0) {
                await snap(page, '99-no-enabled-budbee', '❌ [Step 4] No enabled Budbee pickup points found');
                throw new Error('No enabled Budbee pickup points found in active Afhaalpunten list');
              }

              const firstBudbee = enabledBudbeeButtons.first();
              const firstBudbeeText = (await firstBudbee.innerText()).trim().replace(/\s+/g, ' ');

              await firstBudbee.scrollIntoViewIfNeeded();
              await snap(page, '05-before-budbee-click', `[Step 4] First enabled Budbee option: ${firstBudbeeText}`);

              await firstBudbee.click({ timeout: 15000 });

              await page.waitForTimeout(2000);
              await snap(page, '06-budbee-selected', `✅ [Step 4] Selected Budbee option: ${firstBudbeeText}`);

              await context.storageState({ path: 'storage-state.json' });
              console.log(`Budbee selection completed successfully: ${firstBudbeeText}`);
            } catch (error) {
              await snap(page, '98-step4-error', `❌ [Step 4] Failed: ${error.message}`);
              throw error;
            } finally {
              await context.close();
              await browser.close();
            }
          });
          EOF

          npx playwright test bol-check-order.spec.js --reporter=line

      - name: Upload updated auth state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bol-auth-state
          path: storage-state.json
          if-no-files-found: ignore
          overwrite: true

      - name: Upload step 4 screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bol-step4-screenshots
          path: screenshots/
          if-no-files-found: ignore
