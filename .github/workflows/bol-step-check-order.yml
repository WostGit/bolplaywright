name: "Bol - Step 4: Select Budbee Delivery Option"

on:
  workflow_call:
    inputs:
      bol-email:
        required: true
        type: string

jobs:
  check-order:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
      PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
      PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download auth state
        uses: actions/download-artifact@v4
        with:
          name: bol-auth-state

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm init -y
          npm install @playwright/test
          npx playwright install --with-deps chromium

      - name: Execute Budbee Selection Step
        shell: bash
        run: |
          set -euo pipefail

          cat > bol-check-order.spec.js <<'EOF'
          const { test, expect, chromium, request } = require('@playwright/test');
          const fs = require('fs');
          const path = require('path');

          test('Select Budbee delivery option', async () => {
            test.setTimeout(180000);

            const botToken = process.env.TELEGRAM_BOT_TOKEN;
            const chatId = process.env.TELEGRAM_CHAT_ID;

            async function sendTelegramAlert(filePath, caption) {
              if (!botToken || !chatId) return;
              try {
                const apiContext = await request.newContext();
                const buffer = fs.readFileSync(filePath);
                await apiContext.post(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                  multipart: {
                    chat_id: chatId,
                    caption,
                    photo: {
                      name: path.basename(filePath),
                      mimeType: 'image/png',
                      buffer
                    }
                  }
                });
                await apiContext.dispose();
              } catch (e) {
                console.error('Telegram Error:', e.message);
              }
            }

            async function snap(page, name, caption, fullPage = true) {
              const filePath = `screenshots/${name}.png`;
              fs.mkdirSync('screenshots', { recursive: true });
              await page.screenshot({ path: filePath, fullPage }).catch(() => {});
              if (fs.existsSync(filePath)) {
                await sendTelegramAlert(filePath, caption);
              }
            }

            async function openCheckoutLikePage(page, attempt) {
              const urls = [
                'https://www.bol.com/nl/nl/checkout/',
                'https://www.bol.com/nl/nl/basket/',
                'https://www.bol.com/nl/nl/winkelwagentje/'
              ];

              let lastError = null;

              for (const url of urls) {
                try {
                  console.log(`[Attempt ${attempt}] Navigating to ${url}`);
                  await page.goto(url, {
                    waitUntil: 'domcontentloaded',
                    timeout: 60000
                  });

                  await page.waitForTimeout(3000);
                  await snap(page, `01-open-${attempt}`, `[Step 4][Attempt ${attempt}] Opened ${page.url()}`);

                  const currentUrl = page.url();

                  if (currentUrl.startsWith('chrome-error://')) {
                    throw new Error(`Chromium error page reached from ${url}`);
                  }

                  if (/login/i.test(currentUrl)) {
                    throw new Error(`Redirected to login page from ${url}: ${currentUrl}`);
                  }

                  return currentUrl;
                } catch (err) {
                  lastError = err;
                  console.error(`[Attempt ${attempt}] Failed opening ${url}: ${err.message}`);
                  await snap(page, `02-open-failed-${attempt}`, `[Step 4][Attempt ${attempt}] Failed opening ${url}: ${err.message}`);
                }
              }

              throw lastError || new Error('Could not open any checkout-related page');
            }

            async function waitForPickupPoints(dialog, page, attempt) {
              const pickupTab = dialog.getByRole('tab', { name: /^Afhaalpunten$/i });
              await expect(pickupTab).toBeVisible({ timeout: 15000 });

              const selected = await pickupTab.getAttribute('aria-selected');
              if (selected !== 'true') {
                await pickupTab.click();
              }

              await snap(page, `06-pickup-tab-${attempt}`, `[Step 4][Attempt ${attempt}] Afhaalpunten tab active`);

              const activePanel = dialog.locator('[role="tabpanel"][data-state="active"]').first();
              await expect(activePanel).toBeVisible({ timeout: 15000 });

              const pickupList = activePanel.locator('ol[aria-labelledby="pickuppoints-label"], ol').first();
              await expect(pickupList).toBeVisible({ timeout: 20000 });

              await expect.poll(
                async () => await pickupList.locator('li').count(),
                {
                  timeout: 30000,
                  intervals: [1000, 1500, 2000, 2500]
                }
              ).toBeGreaterThan(0);

              await snap(page, `07-pickup-list-loaded-${attempt}`, `[Step 4][Attempt ${attempt}] Pickup point list loaded`);

              const enabledBudbeeButtons = activePanel.locator('li[id^="BUNUR"] > button:not([disabled])');

              await expect.poll(
                async () => await enabledBudbeeButtons.count(),
                {
                  timeout: 30000,
                  intervals: [1000, 1500, 2000, 2500]
                }
              ).toBeGreaterThan(0);

              return enabledBudbeeButtons;
            }

            async function confirmBudbeeSelected(page, selectedText, attempt) {
              const deliverySection = page.locator('#section-delivery-or-billing-locations').first();
              await expect(deliverySection).toBeVisible({ timeout: 20000 });

              const normalizedSelected = selectedText.replace(/\s+/g, ' ').trim();

              const confirmed = await expect.poll(
                async () => {
                  const dialogStillOpen = await page.locator('[role="dialog"]').isVisible().catch(() => false);

                  const sectionText = await deliverySection.innerText().catch(() => '');
                  const normalizedSection = sectionText.replace(/\s+/g, ' ').trim();

                  const hasBudbeeId = /BUNUR/i.test(await page.content().catch(() => ''));
                  const containsSelectedPickup =
                    normalizedSelected.length > 0 && normalizedSection.includes(normalizedSelected);

                  const looksLikePickupSelected =
                    /haal je pakket op|afhaalpunt/i.test(normalizedSection);

                  return !dialogStillOpen && (containsSelectedPickup || (looksLikePickupSelected && hasBudbeeId));
                },
                {
                  timeout: 25000,
                  intervals: [1000, 1500, 2000, 2500]
                }
              ).toBeTruthy().then(() => true).catch(() => false);

              await snap(
                page,
                `10-budbee-confirm-check-${attempt}`,
                confirmed
                  ? `✅ [Step 4][Attempt ${attempt}] Budbee confirmed`
                  : `❌ [Step 4][Attempt ${attempt}] Budbee not confirmed`
              );

              return confirmed;
            }

            async function trySelectBudbee(attempt) {
              const browser = await chromium.launch({ headless: true });

              const context = await browser.newContext({
                viewport: { width: 1366, height: 768 },
                storageState: 'storage-state.json',
                proxy: process.env.PROXY_SERVER ? {
                  server: process.env.PROXY_SERVER,
                  username: process.env.PROXY_USERNAME,
                  password: process.env.PROXY_PASSWORD
                } : undefined
              });

              const page = await context.newPage();
              page.setDefaultTimeout(30000);
              page.setDefaultNavigationTimeout(60000);

              try {
                const openedUrl = await openCheckoutLikePage(page, attempt);
                await snap(page, `03-checkout-opened-attempt-${attempt}`, `[Step 4][Attempt ${attempt}] Ready at ${openedUrl}`);

                await page.getByRole('button', { name: /Accepteren|Alles accepteren/i }).click().catch(() => {});
                await snap(page, `04-cookies-attempt-${attempt}`, `[Step 4][Attempt ${attempt}] Cookies handled`);

                const otherAddressBtn = page.getByRole('button', { name: /^Ander bezorgadres of afhaalpunt$/i });
                await expect(otherAddressBtn).toBeVisible({ timeout: 20000 });
                await otherAddressBtn.click();

                await snap(page, `05-dialog-open-triggered-${attempt}`, `[Step 4][Attempt ${attempt}] Clicked alternate pickup button`);

                const dialog = page.locator('[role="dialog"]').filter({ hasText: /Je bezorgadressen/i }).first();
                await expect(dialog).toBeVisible({ timeout: 20000 });
                await snap(page, `05b-dialog-visible-${attempt}`, `[Step 4][Attempt ${attempt}] Delivery-point dialog visible`);

                const enabledBudbeeButtons = await waitForPickupPoints(dialog, page, attempt);

                const firstBudbee = enabledBudbeeButtons.first();
                const firstBudbeeText = (await firstBudbee.innerText()).trim().replace(/\s+/g, ' ');

                await firstBudbee.scrollIntoViewIfNeeded();
                await snap(page, `08-before-budbee-click-${attempt}`, `[Step 4][Attempt ${attempt}] First enabled Budbee option: ${firstBudbeeText}`);

                await firstBudbee.click({ timeout: 15000 });
                await page.waitForTimeout(3000);

                await snap(page, `09-budbee-clicked-${attempt}`, `[Step 4][Attempt ${attempt}] Clicked Budbee option: ${firstBudbeeText}`);

                const confirmed = await confirmBudbeeSelected(page, firstBudbeeText, attempt);
                if (!confirmed) {
                  throw new Error(`Budbee option was clicked but not confirmed on the checkout page`);
                }

                await context.storageState({ path: 'storage-state.json' });

                await context.close();
                await browser.close();
                return true;
              } catch (error) {
                console.error(`[Attempt ${attempt}] Step 4 failed: ${error.message}`);
                await snap(page, `98-step4-error-attempt-${attempt}`, `❌ [Step 4][Attempt ${attempt}] Failed: ${error.message}`);
                await context.close().catch(() => {});
                await browser.close().catch(() => {});
                return false;
              }
            }

            let success = false;
            const maxAttempts = 3;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              console.log(`Starting Step 4 attempt ${attempt} of ${maxAttempts}`);
              success = await trySelectBudbee(attempt);
              if (success) break;

              if (attempt < maxAttempts) {
                console.log(`Step 4 attempt ${attempt} failed, retrying...`);
                await new Promise(resolve => setTimeout(resolve, 5000));
              }
            }

            if (!success) {
              throw new Error(`Step 4 failed after ${maxAttempts} attempts`);
            }
          });
          EOF

          npx playwright test bol-check-order.spec.js --reporter=line

      - name: Upload updated auth state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bol-auth-state
          path: storage-state.json
          if-no-files-found: ignore
          overwrite: true

      - name: Upload step 4 screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bol-step4-screenshots
          path: screenshots/
          if-no-files-found: ignore
