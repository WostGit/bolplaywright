name: Playwright Bol Registration Only

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      DATASET_URL: https://raw.githubusercontent.com/LJPc-solutions/Nederlandse-adressen-en-postcodes/main/Nederland.csv.zst
      DATASET_DIR: .cache/nl-addresses
      DATASET_FILE: .cache/nl-addresses/Nederland.csv.zst
      BOL_SALUTATION: "UNKNOWN"
      PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
      PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
      PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
      BOL_PASSWORD: ${{ secrets.BOL_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$PROXY_SERVER" || { echo "Missing PROXY_SERVER"; exit 1; }
          test -n "$PROXY_USERNAME" || { echo "Missing PROXY_USERNAME"; exit 1; }
          test -n "$PROXY_PASSWORD" || { echo "Missing PROXY_PASSWORD"; exit 1; }
          test -n "$BOL_PASSWORD" || { echo "Missing BOL_PASSWORD"; exit 1; }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependency
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install zstandard

      - name: Restore cached dataset
        id: cache-dataset
        uses: actions/cache@v4
        with:
          path: .cache/nl-addresses
          key: ${{ runner.os }}-nl-addresses-v12
          restore-keys: |
            ${{ runner.os }}-nl-addresses-

      - name: Download dataset on cache miss
        if: steps.cache-dataset.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p "$DATASET_DIR"
          curl -L --fail --retry 5 --retry-delay 5 \
            -A "playwright-bol-register/1.0" \
            "$DATASET_URL" -o "$DATASET_FILE"
          ls -lh "$DATASET_FILE"

      - name: Generate identity and random Dutch address
        shell: bash
        run: |
          cat > random_nl_house.py <<'PY'
          import csv
          import io
          import os
          import random
          import re
          import zstandard as zstd

          DATASET_FILE = os.environ["DATASET_FILE"]

          def random_address_from_local_zstd_csv(path: str):
              with open(path, "rb") as f:
                  dctx = zstd.ZstdDecompressor()
                  with dctx.stream_reader(f) as reader:
                      text_stream = io.TextIOWrapper(reader, encoding="utf-8", newline="")
                      csv_reader = csv.DictReader(text_stream, delimiter=";")
                      chosen = None
                      count = 0
                      for row in csv_reader:
                          straat = (row.get("straat") or "").strip()
                          huisnummer = (row.get("huisnummer") or "").strip()
                          postcode = (row.get("postcode") or "").strip()
                          if not straat or not huisnummer or not postcode:
                              continue
                          count += 1
                          if random.randrange(count) == 0:
                              chosen = row
                      if chosen is None:
                          raise RuntimeError("No valid address found in dataset")
                      return chosen

          first_names = ["Jan","Pieter","Kees","Henk","Hans","Johan","Peter","Paul","Mark","Bas","Tom","Daan","Bram","Luuk","Milan"]
          last_names = ["De Jong","Jansen","De Vries","Van den Berg","Bakker","Visser","Smit","Meijer","De Boer","Mulder"]

          first_name = random.choice(first_names)
          last_name = random.choice(last_names)
          row = random_address_from_local_zstd_csv(DATASET_FILE)

          postcode = (row.get("postcode") or "").strip().replace(" ", "").upper()
          huisnummer = (row.get("huisnummer") or "").strip()
          phone = "06" + "".join(str(random.randint(0, 9)) for _ in range(8))
          email = f"{first_name.lower()}{last_name.lower().replace(' ', '')}@qrlfoundation.org"

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f'BOL_FIRST_NAME={first_name}\n')
              f.write(f'BOL_LAST_NAME={last_name}\n')
              f.write(f'BOL_PHONE={phone}\n')
              f.write(f'BOL_EMAIL={email}\n')
              f.write(f'BOL_POSTAL_CODE={postcode}\n')
              f.write(f'BOL_STREET_NUMBER={huisnummer}\n')
          PY
          python random_nl_house.py

      - name: Create Playwright Config & Test
        shell: bash
        run: |
          mkdir -p tests

          cat > playwright.config.js <<'EOF'
          const { defineConfig } = require('@playwright/test');
          module.exports = defineConfig({
            timeout: 300000,
            expect: { timeout: 30000 },
            retries: 1,
            use: {
              headless: true,
              locale: 'nl-NL',
              timezoneId: 'Europe/Amsterdam',
              viewport: { width: 1366, height: 768 },
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              proxy: {
                server: process.env.PROXY_SERVER,
                username: process.env.PROXY_USERNAME,
                password: process.env.PROXY_PASSWORD
              },
              screenshot: 'on',
              video: 'on'
            }
          });
          EOF

          cat > tests/bol-register.spec.js <<'EOF'
          const { test } = require('@playwright/test');

          test('bol.com registration', async ({ page }) => {
            async function snap(name) {
              await page.screenshot({ path: `test-results/${name}.png`, fullPage: true });
            }

            await page.goto('https://login.bol.com/wsp/register', { waitUntil: 'domcontentloaded', timeout: 60000 });
            await page.waitForTimeout(3000);
            await snap('01-page-loaded');

            // Gender selection
            const genderSelectors = [
              'button[title*="liever geen"]',
              'button[title*="heer"]',
              'button[role="radio"]'
            ];
            for (const sel of genderSelectors) {
              try {
                const el = page.locator(sel).first();
                if (await el.isVisible({ timeout: 5000 })) {
                  await el.scrollIntoViewIfNeeded();
                  await el.click({ force: true });
                  break;
                }
              } catch {}
            }
            await page.waitForTimeout(2000);
            await snap('02-gender-selected');

            // Fill form
            await page.getByLabel(/voornaam/i).fill(process.env.BOL_FIRST_NAME);
            await page.getByLabel(/achternaam/i).fill(process.env.BOL_LAST_NAME);
            await snap('03-names-filled');

            await page.getByLabel(/postcode/i).fill(process.env.BOL_POSTAL_CODE);
            await page.getByLabel(/huisnummer/i).fill(process.env.BOL_STREET_NUMBER);
            await page.waitForTimeout(4000);   // Wait for address validation
            await snap('04-address-filled');

            await page.getByLabel(/telefoonnummer/i).fill(process.env.BOL_PHONE);
            await page.getByLabel(/e-mailadres/i).fill(process.env.BOL_EMAIL);
            await page.getByLabel(/wachtwoord/i).fill(process.env.BOL_PASSWORD);
            await snap('05-credentials-filled');

            // Submit
            const submitBtn = page.getByRole('button', { name: /registreer|aanmaken/i }).first();
            await submitBtn.scrollIntoViewIfNeeded();
            await submitBtn.click({ force: true });
            await page.waitForTimeout(8000);
            await snap('06-submitted');
          });
          EOF

      - name: Install & Run Playwright
        shell: bash
        run: |
          npm install @playwright/test
          npx playwright install --with-deps chromium
          npx playwright test

      - name: Persist registered email
        if: always()
        shell: bash
        run: |
          mkdir -p data
          python3 -c '
          import json, os
          email = os.environ.get("BOL_EMAIL")
          if email:
              path = "data/registered-emails.json"
              try:
                  with open(path) as f: data = json.load(f)
              except: data = []
              if not any(e.get("email") == email for e in data):
                  data.append({"email": email, "used_to_login": False, "registered_at": os.environ.get("GITHUB_RUN_ID")})
              with open(path, "w") as f: json.dump(data, f, indent=2)
          '

      - name: Commit registered email
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/registered-emails.json
          git diff --cached --quiet && exit 0
          git commit -m "Add new registered email - run $GITHUB_RUN_ID" && git push || echo "Nothing to commit"
