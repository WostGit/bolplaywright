name: Playwright Bol Registration Only

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      DATASET_URL: https://raw.githubusercontent.com/LJPc-solutions/Nederlandse-adressen-en-postcodes/main/Nederland.csv.zst
      DATASET_DIR: .cache/nl-addresses
      DATASET_FILE: .cache/nl-addresses/Nederland.csv.zst
      BOL_SALUTATION: "UNKNOWN"
      BOL_COUNTRY_MODE: "NL"
      BOL_PURCHASE_NEWSLETTER: "true"
      BOL_RECOMMENDATION_NEWSLETTER: "false"
      SUBMIT_FORM: "true"
      PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
      PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
      PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
      BOL_PASSWORD: ${{ secrets.BOL_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$PROXY_SERVER" || { echo "Missing secret PROXY_SERVER"; exit 1; }
          test -n "$PROXY_USERNAME" || { echo "Missing secret PROXY_USERNAME"; exit 1; }
          test -n "$PROXY_PASSWORD" || { echo "Missing secret PROXY_PASSWORD"; exit 1; }
          test -n "$BOL_PASSWORD" || { echo "Missing secret BOL_PASSWORD"; exit 1; }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependency
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install zstandard

      - name: Restore cached dataset
        id: cache-dataset
        uses: actions/cache@v4
        with:
          path: .cache/nl-addresses
          key: ${{ runner.os }}-nl-addresses-ljpc-nederland-v11

      - name: Download dataset on cache miss
        if: steps.cache-dataset.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p "$DATASET_DIR"
          curl -L --fail --retry 3 --retry-delay 2 \
            -A "playwright-bol-register/1.0" \
            "$DATASET_URL" -o "$DATASET_FILE"

      - name: Generate identity and random Dutch address
        shell: bash
        run: |
          cat > random_nl_house.py <<'PY'
          import csv, io, os, random, re, zstandard as zstd
          DATASET_FILE = os.environ["DATASET_FILE"]
          def random_address_from_local_zstd_csv(path: str) -> dict:
              with open(path, "rb") as f:
                  dctx = zstd.ZstdDecompressor()
                  with dctx.stream_reader(f) as reader:
                      text_stream = io.TextIOWrapper(reader, encoding="utf-8", newline="")
                      csv_reader = csv.DictReader(text_stream, delimiter=";")
                      chosen = None
                      count = 0
                      for row in csv_reader:
                          if not all((row.get(k) or "").strip() for k in ["straat","huisnummer","postcode"]): continue
                          count += 1
                          if random.randrange(count) == 0:
                              chosen = row
                      return chosen
          def sanitize_email_part(value: str) -> str:
              value = value.strip().lower()
              replacements = {"á":"a","é":"e","í":"i","ó":"o","ú":"u","ç":"c","ñ":"n","ĳ":"ij"}
              for src, dst in replacements.items(): value = value.replace(src, dst)
              return re.sub(r"[^a-z0-9]", "", value)
          first_names = ["Jan","Pieter","Kees","Henk","Hans","Johan","Peter","Paul","Mark","Bas","Bart","Tom","Tim","Ruben","Daan","Bram","Thijs","Niels","Koen","Jasper"]
          last_names = ["De Jong","Jansen","De Vries","Van den Berg","Van Dijk","Bakker","Janssen","Visser","Smit","Meijer"]
          first_name = random.choice(first_names)
          last_name = random.choice(last_names)
          row = random_address_from_local_zstd_csv(DATASET_FILE)
          postcode = (row.get("postcode") or "").strip().replace(" ", "").upper()
          huisnummer = (row.get("huisnummer") or "").strip()
          phone = "06" + "".join(str(random.randint(0,9)) for _ in range(8))
          email = f"{sanitize_email_part(first_name)}{sanitize_email_part(last_name)}@qrlfoundation.org"
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f'BOL_FIRST_NAME={first_name}\nBOL_LAST_NAME={last_name}\nBOL_PHONE={phone}\nBOL_EMAIL={email}\nBOL_POSTAL_CODE={postcode}\nBOL_STREET_NUMBER={huisnummer}\n')
          PY
          python random_nl_house.py

      - name: Create package.json & Install
        shell: bash
        run: |
          cat > package.json <<'EOF'
          {"name": "bol-register","private": true,"devDependencies": {"@playwright/test": "^1.54.0"}}
          EOF
          npm install
          npx playwright install --with-deps chromium

      - name: Create Playwright config
        shell: bash
        run: |
          cat > playwright.config.js <<'EOF'
          const { defineConfig, devices } = require('@playwright/test');
          module.exports = defineConfig({
            testDir: './tests',
            timeout: 240000,
            retries: 1,
            use: {
              headless: true,
              locale: 'nl-NL',
              timezoneId: 'Europe/Amsterdam',
              viewport: { width: 1366, height: 768 },
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              proxy: { server: process.env.PROXY_SERVER, username: process.env.PROXY_USERNAME, password: process.env.PROXY_PASSWORD },
              screenshot: 'only-on-failure',
              video: 'retain-on-failure'
            }
          });
          EOF

      - name: Create Playwright Registration Test (with Gender Selection)
        shell: bash
        run: |
          mkdir -p tests
          cat > tests/bol-register-smart.spec.js <<'EOF'
          const { test, expect } = require('@playwright/test');
          const fs = require('fs');
          const path = require('path');

          test('bol.com registration with gender', async ({ page }, testInfo) => {
            const screenshotDir = path.join(testInfo.outputDir, 'screenshots');
            fs.mkdirSync(screenshotDir, { recursive: true });
            let step = 1;
            async function snap(name) {
              await page.screenshot({ path: path.join(screenshotDir, `${String(step++).padStart(2,'0')}-${name}.png`), fullPage: true });
            }

            const formData = {
              firstName: process.env.BOL_FIRST_NAME,
              lastName: process.env.BOL_LAST_NAME,
              email: process.env.BOL_EMAIL,
              password: process.env.BOL_PASSWORD,
              postalCode: process.env.BOL_POSTAL_CODE,
              streetNumber: process.env.BOL_STREET_NUMBER,
              phone: process.env.BOL_PHONE,
              salutation: process.env.BOL_SALUTATION || 'UNKNOWN'
            };

            await page.goto('https://login.bol.com/wsp/register', { waitUntil: 'domcontentloaded' });
            await snap('01-register-page');

            // === GENDER / SALUTATION SELECTION ===
            const genderButtons = page.locator('button[role="radio"], button[title*="heer"], button[title*="mevrouw"], button[title*="liever geen"]');
            const count = await genderButtons.count();
            let selected = false;
            for (let i = 0; i < count; i++) {
              const btn = genderButtons.nth(i);
              const title = (await btn.getAttribute('title') || '').toLowerCase();
              if (formData.salutation === 'UNKNOWN' && /liever geen/i.test(title)) {
                await btn.click();
                selected = true;
                break;
              } else if (title.includes('heer') || title.includes('mevrouw')) {
                await btn.click();
                selected = true;
                break;
              }
            }
            if (!selected) {
              // Fallback: click first available
              await genderButtons.first().click();
            }
            await snap('02-gender-selected');

            // Fill form
            await page.getByLabel(/voornaam/i).fill(formData.firstName);
            await page.getByLabel(/achternaam/i).fill(formData.lastName);
            await snap('03-names-filled');

            await page.getByLabel(/postcode/i).fill(formData.postalCode);
            await page.getByLabel(/huisnummer/i).fill(formData.streetNumber);
            await page.waitForTimeout(2500);
            await snap('04-address-filled');

            await page.getByLabel(/telefoonnummer/i).fill(formData.phone);
            await page.getByLabel(/e-mailadres/i).fill(formData.email);
            await page.getByLabel(/wachtwoord/i).fill(formData.password);
            await snap('05-credentials-filled');

            // Submit
            const submitBtn = page.getByRole('button', { name: /registreer|aanmaken/i }).first();
            await submitBtn.scrollIntoViewIfNeeded();
            await submitBtn.click();
            await page.waitForTimeout(6000);
            await snap('06-submitted');
          });
          EOF

      - name: Run Playwright test
        shell: bash
        run: npx playwright test

      - name: Persist registered email
        if: always()
        shell: bash
        run: |
          mkdir -p data
          python <<'PY'
          import json, os
          path = "data/registered-emails.json"
          email = os.environ.get("BOL_EMAIL", "").strip()
          if not email: exit(0)
          entry = {"email": email, "registered_at": os.environ.get("GITHUB_RUN_ID"), "used_to_login": False, "login_count": 0, "last_login": None}
          try:
              with open(path, "r", encoding="utf-8") as f: data = json.load(f)
              if not isinstance(data, list): data = []
          except: data = []
          if not any(a.get("email") == email for a in data):
              data.append(entry)
          with open(path, "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
          PY

      - name: Commit registered email
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/registered-emails.json
          git diff --cached --quiet && exit 0
          git commit -m "Add registered email - run $GITHUB_RUN_ID"
          git push
