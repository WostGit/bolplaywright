name: "Bol - Step 3: Go to Order / Checkout"

on:
  workflow_call:
    inputs:
      bol-email:
        required: true
        type: string

jobs:
  go-to-order:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
      PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
      PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install @playwright/test
          # --with-deps is CRITICAL for non-headless mode on Ubuntu runners
          npx playwright install --with-deps chromium

      - name: Execute Go to Order Step
        shell: bash
        run: |
          set -euo pipefail
          echo "================================================================="
          echo " STEP 3: GO TO ORDER / CHECKOUT (HEADED MODE)"
          echo "================================================================="

          cat > bol-go-order.spec.js <<'EOF'
          const { test, chromium } = require('@playwright/test');
          const fs = require('fs');
          const path = require('path');

          test('Proceed to Checkout', async () => {
            const botToken = process.env.TELEGRAM_BOT_TOKEN;
            const chatId = process.env.TELEGRAM_CHAT_ID;

            async function sendTelegramAlert(filePath, caption) {
              if (!botToken || !chatId) return;
              try {
                const { request } = require('@playwright/test');
                const apiContext = await request.newContext();
                const buffer = fs.readFileSync(filePath);
                await apiContext.post(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                  multipart: {
                    chat_id: chatId,
                    caption: caption,
                    photo: {
                      name: path.basename(filePath),
                      mimeType: 'image/png',
                      buffer: buffer
                    }
                  }
                });
              } catch (e) {
                console.error('Telegram Error:', e.message);
              }
            }

            // RUNNING IN HEADED MODE
            const browser = await chromium.launch({ 
              headless: false 
            });

            const context = await browser.newContext({
              viewport: { width: 1280, height: 720 },
              proxy: {
                server: process.env.PROXY_SERVER,
                username: process.env.PROXY_USERNAME,
                password: process.env.PROXY_PASSWORD
              }
            });

            const page = await context.newPage();

            try {
              await page.goto('https://www.bol.com/nl/nl/winkelwagentje/', { 
                waitUntil: 'domcontentloaded', 
                timeout: 60000 
              });

              // Click the checkout button
              // Bol often has multiple buttons; we target the primary checkout link
              const checkoutBtn = page.getByRole('link', { name: /Naar bestellen|Bestellen|Doorgaan/i }).first();
              await checkoutBtn.waitFor({ state: 'visible' });
              await checkoutBtn.click();

              await page.waitForLoadState('networkidle');

              const screenshotPath = 'checkout-page.png';
              await page.screenshot({ path: screenshotPath, fullPage: true });
              await sendTelegramAlert(screenshotPath, '✅ Reached Checkout / Order page (Headed)');

              console.log('Navigated to order page successfully');
            } catch (err) {
              console.error('Test failed:', err.message);
              // Take error screenshot
              await page.screenshot({ path: 'error.png' });
              throw err;
            } finally {
              await context.close();
              await browser.close();
            }
          });
          EOF

          # xvfb-run provides the virtual display for headless: false to work
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" npx playwright test bol-go-order.spec.js
