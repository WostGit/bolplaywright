name: "Bol - Step 3: Go to Order / Checkout"

on:
  workflow_call:
    inputs:
      bol-email:
        required: true
        type: string

jobs:
  go-to-order:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
      PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
      PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download auth state
        uses: actions/download-artifact@v4
        with:
          name: bol-auth-state

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm init -y
          npm install @playwright/test
          npx playwright install --with-deps chromium

      - name: Execute Go to Order Step
        shell: bash
        run: |
          set -euo pipefail

          cat > bol-go-order.spec.js <<'EOF'
          const { test, expect, chromium, request } = require('@playwright/test');
          const fs = require('fs');
          const path = require('path');

          test('Proceed to Checkout', async () => {
            test.setTimeout(120000);

            const botToken = process.env.TELEGRAM_BOT_TOKEN;
            const chatId = process.env.TELEGRAM_CHAT_ID;

            async function sendTelegramAlert(filePath, caption) {
              if (!botToken || !chatId) return;
              try {
                const apiContext = await request.newContext();
                const buffer = fs.readFileSync(filePath);
                await apiContext.post(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                  multipart: {
                    chat_id: chatId,
                    caption,
                    photo: {
                      name: path.basename(filePath),
                      mimeType: 'image/png',
                      buffer
                    }
                  }
                });
                await apiContext.dispose();
              } catch (e) {
                console.error('Telegram Error:', e.message);
              }
            }

            async function snap(page, name, caption, fullPage = true) {
              const filePath = `screenshots/${name}.png`;
              fs.mkdirSync('screenshots', { recursive: true });
              await page.screenshot({ path: filePath, fullPage });
              await sendTelegramAlert(filePath, caption);
            }

            const browser = await chromium.launch({ headless: true });

            const context = await browser.newContext({
              viewport: { width: 1366, height: 768 },
              storageState: 'storage-state.json',
              proxy: process.env.PROXY_SERVER ? {
                server: process.env.PROXY_SERVER,
                username: process.env.PROXY_USERNAME,
                password: process.env.PROXY_PASSWORD
              } : undefined
            });

            const page = await context.newPage();
            page.setDefaultTimeout(30000);
            page.setDefaultNavigationTimeout(60000);

            try {
              await page.goto('https://www.bol.com/nl/nl/basket/', {
                waitUntil: 'domcontentloaded',
                timeout: 60000
              });

              await snap(page, '01-basket-opened', `[Step 3] Basket page opened: ${page.url()}`);

              if (/login/i.test(page.url())) {
                throw new Error(`Redirected to login page. Auth state missing or expired. URL: ${page.url()}`);
              }

              await page.getByRole('button', { name: /Accepteren|Alles accepteren/i }).click().catch(() => {});
              await snap(page, '02-cookies-handled', '[Step 3] Cookies handled');

              // Give the basket UI a moment to render, but do not wait for networkidle
              await page.waitForTimeout(3000);
              await snap(page, '03-after-render-wait', '[Step 3] Basket render wait completed');

              const checkoutBtn = page
                .locator('a, button')
                .filter({ hasText: /Verder naar bestellen/i })
                .first();

              await expect(checkoutBtn).toBeVisible({ timeout: 20000 });
              await snap(page, '04-checkout-visible', '[Step 3] Found "Verder naar bestellen"');

              await checkoutBtn.click({ timeout: 20000 });
              await snap(page, '05-checkout-clicked', '[Step 3] Clicked "Verder naar bestellen"');

              // Wait for URL change or visible checkout content, not networkidle
              await Promise.race([
                page.waitForURL(/bestellen|checkout|order/i, { timeout: 30000 }),
                page.locator('body').waitFor({ state: 'visible', timeout: 30000 })
              ]);

              await page.waitForTimeout(3000);
              await snap(page, '06-after-checkout', `✅ [Step 3] After checkout click: ${page.url()}`);

              await context.storageState({ path: 'storage-state.json' });
              console.log(`Navigated to order page successfully: ${page.url()}`);
            } catch (err) {
              await snap(page, '99-step3-error', `❌ [Step 3] Failed: ${err.message}`);
              throw err;
            } finally {
              await context.close();
              await browser.close();
            }
          });
          EOF

          npx playwright test bol-go-order.spec.js --reporter=line

      - name: Upload updated auth state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bol-auth-state
          path: storage-state.json
          if-no-files-found: ignore
          overwrite: true

      - name: Upload step 3 screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bol-step3-screenshots
          path: screenshots/
          if-no-files-found: ignore
