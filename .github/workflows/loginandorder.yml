name: Playwright Bol Unified Flow
on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  run-full-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    
    env:
      BOL_PASSWORD: ${{ secrets.BOL_PASSWORD }}
      PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
      PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
      PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
      # Massive trace flags across the whole job
      DEBUG: "pw:api,pw:browser,pw:protocol"

    steps:
      - name: "[System] Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "[System] Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "[System] Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "[System] Install Python dependencies"
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: "[Prep] Extract unused email from YAML"
        id: get-email
        shell: bash
        run: |
          set -euo pipefail
          echo "================================================================="
          echo " STEP 0: EXTRACTING EMAIL ADDRESS"
          echo "================================================================="
          python <<'PY'
          import yaml
          import os

          path = "data/registered-emails.yml"
          if not os.path.exists(path):
              print("[FATAL ERROR] No registration file found at data/registered-emails.yml! Exiting.")
              exit(1)

          with open(path, "r", encoding="utf-8") as f:
              data = yaml.safe_load(f) or []

          target_account = None
          for entry in data:
              if not entry.get("used_to_login", False):
                  target_account = entry
                  break

          if not target_account:
              print("[FATAL ERROR] No unused accounts available for login!")
              exit(1)

          email = target_account["email"]
          print(f"[SUCCESS] Target account localized: {email}")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"BOL_EMAIL={email}\n")
          PY

      - name: "[Prep] Create project files dynamically"
        shell: bash
        run: |
          set -euo pipefail
          echo "================================================================="
          echo " STEP 0.5: WRITING PROJECT CONFIGS"
          echo "================================================================="
          
          # Notice we removed the extra stealth packages entirely to stop the line 65 crash
          cat > package.json <<'EOF'
          {
            "name": "bol-flow",
            "private": true,
            "devDependencies": {
              "@playwright/test": "^1.54.0"
            }
          }
          EOF
          echo "[INFO] package.json created."

          cat > playwright.config.js <<'EOF'
          const { defineConfig } = require('@playwright/test');
          module.exports = defineConfig({
            timeout: 300000, 
            expect: { timeout: 15000 },
            use: { 
              headless: false,
              viewport: { width: 1366, height: 768 }
            },
            projects: [{ name: 'chromium' }]
          });
          EOF
          echo "[INFO] playwright.config.js created."

      - name: "[System] Install Node Dependencies"
        shell: bash
        run: npm install

      - name: "[System] Install Playwright Chromium with deps"
        shell: bash
        run: npx playwright install --with-deps chromium

      # ========================================================================
      # STEP 1: CREATE & RUN THE LOGIN JS SCRIPT
      # ========================================================================
      - name: "[Step 1] Execute Stealth Login"
        shell: bash
        run: |
          set -euo pipefail
          echo "================================================================="
          echo " STEP 1: INITIATING LOGIN AND STATE CREATION"
          echo "================================================================="
          
          cat > bol-login.spec.js <<'EOF'
          const { test, expect, chromium } = require('@playwright/test');
          const fs = require('fs');
          const path = require('path');

          test('Login flow and extract cookies', async () => {
            console.log('\n[LOGIN LOG] Script started.');
            const email = process.env.BOL_EMAIL;
            const password = process.env.BOL_PASSWORD;
            
            console.log(`[LOGIN LOG] Target account set to: ${email}`);

            const browser = await chromium.launch({
              headless: false,
              args: [
                '--disable-blink-features=AutomationControlled',
                '--disable-infobars'
              ]
            });
            console.log('[LOGIN LOG] Browser instance launched successfully.');
            
            const context = await browser.newContext({
              locale: 'nl-NL',
              timezoneId: 'Europe/Amsterdam',
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
              proxy: {
                server: process.env.PROXY_SERVER,
                username: process.env.PROXY_USERNAME,
                password: process.env.PROXY_PASSWORD
              }
            });
            console.log('[LOGIN LOG] Context instantiated with static UserAgent and proxy.');

            const page = await context.newPage();
            page.setDefaultTimeout(30000);

            console.log('[LOGIN LOG] Triggering page.goto to Bol.com homepage...');
            const response = await page.goto('https://www.bol.com/nl/nl/', { waitUntil: 'domcontentloaded' });
            console.log(`[LOGIN LOG] Navigation settled. HTTP Status: ${response.status()}`);
            
            console.log('[LOGIN LOG] Intercepting the cookie wall...');
            const cookieBtn = page.locator('button:has-text("Accepteren"), button:has-text("Alles accepteren")').first();
            if (await cookieBtn.isVisible()) {
              console.log('[LOGIN LOG] Found cookie wall. Tapping accept.');
              await cookieBtn.click();
            }

            console.log('[LOGIN LOG] Shifting focus to Inloggen element...');
            await page.locator('a:has-text("Inloggen"), [data-test="login-link"]').first().click();
            
            console.log('[LOGIN LOG] Waiting for WSP Login gateway to mount...');
            await page.waitForURL('**/wsp/login**', { timeout: 20000 });
            console.log(`[LOGIN LOG] Routed to: ${page.url()}`);
            
            console.log('[LOGIN LOG] Injecting strings into the DOM form inputs...');
            await page.locator('input#username').fill(email);
            await page.locator('input#password').fill(password);
            
            console.log('[LOGIN LOG] Clicking proceed submit button...');
            await page.locator('button#submit').click();
            
            console.log('[LOGIN LOG] Waiting for return to root landing domain (logged in state)...');
            await page.waitForURL('https://www.bol.com/nl/nl/', { timeout: 35000 });
            
            const statePath = path.join(process.cwd(), 'state.json');
            console.log(`[LOGIN LOG] Extracting session tree map to: ${statePath}`);
            await context.storageState({ path: statePath });

            console.log('[LOGIN LOG] Verifying state.json existence on disk...');
            if (fs.existsSync(statePath)) {
                console.log(`[LOGIN LOG] Extraction confirmed. File size mapping: ${fs.statSync(statePath).size} bytes.`);
            } else {
                throw new Error('[LOGIN LOG] state.json extraction failed to touch disk.');
            }

            await browser.close();
            console.log('[LOGIN LOG] Browser torn down safely.\n');
          });
          EOF

          xvfb-run npx playwright test bol-login.spec.js

      # ========================================================================
      # STEP 2: CREATE & RUN THE CART JS SCRIPT
      # ========================================================================
      - name: "[Step 2] Execute Add to Cart"
        shell: bash
        run: |
          set -euo pipefail
          echo "================================================================="
          echo " STEP 2: RESTORING STATE AND EXECUTING ORDER"
          echo "================================================================="

          cat > bol-cart.spec.js <<'EOF'
          const { test, expect, chromium } = require('@playwright/test');
          const fs = require('fs');
          const path = require('path');

          test('Restore context and operate in active session', async () => {
            console.log('\n[CART LOG] Cart script active.');
            
            const statePath = path.join(process.cwd(), 'state.json');
            if (!fs.existsSync(statePath)) {
              throw new Error('[CART LOG] Handshake critical break: state.json was not generated by Step 1.');
            }
            console.log(`[CART LOG] Detected active session map at: ${statePath}`);

            const browser = await chromium.launch({
              headless: false,
              args: [
                '--disable-blink-features=AutomationControlled',
                '--disable-infobars'
              ]
            });
            console.log('[CART LOG] Secondary browser process spawned.');
            
            console.log('[CART LOG] Hydrating session storageState into new context...');
            const context = await browser.newContext({
              storageState: statePath,
              locale: 'nl-NL',
              timezoneId: 'Europe/Amsterdam',
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
              proxy: {
                server: process.env.PROXY_SERVER,
                username: process.env.PROXY_USERNAME,
                password: process.env.PROXY_PASSWORD
              }
            });

            const page = await context.newPage();
            page.setDefaultTimeout(30000);

            console.log('[CART LOG] Traversing directly to target product grid...');
            await page.goto('https://www.bol.com/nl/nl/p/apple-airtag-4-stuks/9300000035840899/', { waitUntil: 'domcontentloaded' });
            
            console.log('[CART LOG] Awaiting "In winkelwagen" button visibility state...');
            const buyButton = page.locator('[data-test="add-to-cart-button"]').first();
            await expect(buyButton).toBeVisible({ timeout: 20000 });
            
            console.log('[CART LOG] Button identified. Dispatching click payload...');
            await buyButton.click();
            
            console.log('[CART LOG] Sleeping 4000ms for network cart scripts to settle...');
            await page.waitForTimeout(4000); 
            
            console.log('[CART LOG] Loading verify cart overview page...');
            await page.goto('https://www.bol.com/nl/nl/winkelwagentje/');
            console.log(`[CART LOG] Cart URL check: ${page.url()}`);

            await browser.close();
            console.log('[CART LOG] Flow path closed smoothly.\n');
          });
          EOF

          xvfb-run npx playwright test bol-cart.spec.js

      - name: "[Cleanup] Update master YAML file with login timestamp"
        shell: bash
        run: |
          set -euo pipefail
          echo "================================================================="
          echo " STEP 3: WRAPPING UP AND CLEANING SESSIONS"
          echo "================================================================="
          python <<'PY'
          import yaml
          import os
          from datetime import datetime, timezone

          path = "data/registered-emails.yml"
          email = os.environ.get("BOL_EMAIL")

          with open(path, "r", encoding="utf-8") as f:
              data = yaml.safe_load(f) or []

          updated = False
          now_str = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')
          
          for entry in data:
              if entry.get("email") == email:
                  entry["used_to_login"] = True
                  entry["last_login_at"] = now_str
                  updated = True
                  break

          if updated:
              with open(path, "w", encoding="utf-8") as f:
                  yaml.dump(data, f, default_flow_style=False, sort_keys=False, allow_unicode=True)
              print(f"[SUCCESS] Flagged {email} as used in local database.")
          else:
              print("[WARNING] Could not locate the manipulated account in dataset.")
          PY

      - name: "[Cleanup] Commit and push changes back to repository"
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/registered-emails.yml
          git diff --cached --quiet && exit 0
          git commit -m "Automated update: Locked out email $BOL_EMAIL"
          git push

      - name: "[System] Retain Auth State as downloadable artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-state
          path: state.json
          retention-days: 1
