name: Playwright Bol Unified Flow
on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  run-full-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    
    env:
      BOL_PASSWORD: ${{ secrets.BOL_PASSWORD }}
      PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
      PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
      PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
      DEBUG: "pw:api,pw:browser,pw:protocol"

    steps:
      - name: "[System] Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "[System] Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "[System] Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "[System] Install Python dependencies"
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: "[Prep] Extract unused email from YAML"
        id: get-email
        shell: bash
        run: |
          set -euo pipefail
          echo "================================================================="
          echo " STEP 0: EXTRACTING EMAIL ADDRESS"
          echo "================================================================="
          python <<'PY'
          import yaml
          import os

          path = "data/registered-emails.yml"
          if not os.path.exists(path):
              print("[FATAL ERROR] No registration file found!")
              exit(1)

          with open(path, "r", encoding="utf-8") as f:
              data = yaml.safe_load(f) or []

          target_account = None
          for entry in data:
              if not entry.get("used_to_login", False):
                  target_account = entry
                  break

          if not target_account:
              print("[FATAL ERROR] No unused accounts available for login!")
              exit(1)

          email = target_account["email"]
          print(f"[SUCCESS] Target account localized: {email}")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"BOL_EMAIL={email}\n")
          PY

      - name: "[Prep] Create project files dynamically"
        shell: bash
        run: |
          set -euo pipefail
          echo "================================================================="
          echo " STEP 0.5: WRITING PROJECT CONFIGS"
          echo "================================================================="
          
          cat > package.json <<'EOF'
          {
            "name": "bol-flow",
            "private": true,
            "devDependencies": {
              "@playwright/test": "^1.54.0"
            }
          }
          EOF

          cat > playwright.config.js <<'EOF'
          const { defineConfig } = require('@playwright/test');
          module.exports = defineConfig({
            timeout: 300000, 
            expect: { timeout: 15000 },
            use: { 
              headless: false,
              viewport: { width: 1366, height: 768 }
            },
            projects: [{ name: 'chromium' }]
          });
          EOF

      - name: "[System] Install Node Dependencies"
        shell: bash
        run: npm install

      - name: "[System] Install Playwright Chromium with deps"
        shell: bash
        run: npx playwright install --with-deps chromium

      # ========================================================================
      # COMBINED STEP: LOGIN, TRANSITION TO PRODUCT, AND ADD TO CART
      # ========================================================================
      - name: "[Action] Execute Full Login and Cart Sequence"
        shell: bash
        run: |
          set -euo pipefail
          echo "================================================================="
          echo " STEP 1: LOGGING IN AND PROCEEDING TO ORDER DIRECTLY"
          echo "================================================================="
          
          cat > bol-flow.spec.js <<'EOF'
          const { test, expect, chromium } = require('@playwright/test');
          const fs = require('fs');
          const path = require('path');

          test('Full inline chain: login -> product search -> add to cart', async () => {
            console.log('\n[FLOW LOG] Full flow script started.');
            const email = process.env.BOL_EMAIL;
            const password = process.env.BOL_PASSWORD;
            
            console.log(`[FLOW LOG] Target account set to: ${email}`);

            const browser = await chromium.launch({
              headless: false,
              args: [
                '--disable-blink-features=AutomationControlled',
                '--disable-infobars'
              ]
            });
            console.log('[FLOW LOG] Browser instance launched successfully.');
            
            const context = await browser.newContext({
              locale: 'nl-NL',
              timezoneId: 'Europe/Amsterdam',
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
              proxy: {
                server: process.env.PROXY_SERVER,
                username: process.env.PROXY_USERNAME,
                password: process.env.PROXY_PASSWORD
              }
            });
            console.log('[FLOW LOG] Context instantiated with proxy and static UserAgent.');

            const page = await context.newPage();
            page.setDefaultTimeout(30000);

            // --- STAGE 1: LOG IN ---
            console.log('[FLOW LOG] Navigating to Bol.com homepage...');
            await page.goto('https://www.bol.com/nl/nl/', { waitUntil: 'domcontentloaded' });
            
            console.log('[FLOW LOG] Handling cookie wall if it pops up...');
            const cookieBtn = page.locator('button:has-text("Accepteren"), button:has-text("Alles accepteren")').first();
            if (await cookieBtn.isVisible()) {
              console.log('[FLOW LOG] Cookie wall caught! Clearing it.');
              await cookieBtn.click();
            }

            console.log('[FLOW LOG] Clicking Inloggen element with pointer override...');
            await page.locator('a:has-text("Inloggen"), [data-test="login-link"]').first().click({ force: true });
            
            console.log('[FLOW LOG] Waiting for WSP Login portal to mount...');
            await page.waitForURL('**/wsp/login**', { timeout: 20000 });
            
            console.log('[FLOW LOG] Injecting user credentials...');
            await page.locator('input#username').fill(email);
            await page.locator('input#password').fill(password);
            
            console.log('[FLOW LOG] Clicking sign in submit button...');
            await page.locator('button#submit').click();
            
            console.log('[FLOW LOG] Waiting for return redirection to main domain...');
            await page.waitForURL('https://www.bol.com/nl/nl/', { timeout: 35000 });
            console.log('[FLOW LOG] User session successfully established!');


            // --- STAGE 2: ORGANIC SEARCH (With Ultra-Verbose Error Handling) ---
            console.log('[FLOW LOG] Finding search bar...');
            const searchBar = page.locator('input#search-key, input[type="search"]').first();
            
            try {
              await expect(searchBar).toBeVisible({ timeout: 15000 });
            } catch (err) {
              console.error(`\n[CRITICAL ERROR] Failed while waiting for Search Bar!`);
              console.error(`[DEBUG INFO] Current URL is: ${page.url()}`);
              console.error(`[DEBUG INFO] Reason: ${err.message}\n`);
              throw err;
            }
            
            console.log('[FLOW LOG] Typing product EAN/Title into search...');
            try {
              await searchBar.fill('9300000035840899'); 
              await page.keyboard.press('Enter');
            } catch (err) {
              console.error(`\n[CRITICAL ERROR] Failed to type into the search bar!`);
              console.error(`[DEBUG INFO] HTML state of bar: ${await searchBar.evaluate(el => el.outerHTML).catch(() => 'unreadable')}`);
              throw err;
            }
            
            console.log('[FLOW LOG] Waiting for search results to process...');
            try {
              await page.waitForURL('**/s/?searchtext=**', { timeout: 20000 });
            } catch (err) {
              console.error(`\n[CRITICAL ERROR] The site did not transition to the search results page!`);
              console.error(`[DEBUG INFO] Stuck at URL: ${page.url()}`);
              throw err;
            }
            
            console.log('[FLOW LOG] Locating product in search results...');
            const productTitleLink = page.locator('a.product-title').first();
            
            try {
              await expect(productTitleLink).toBeVisible({ timeout: 15000 });
              console.log('[FLOW LOG] Clicking the top search result product...');
              await productTitleLink.click();
            } catch (err) {
              console.error(`\n[CRITICAL ERROR] Failed to locate or click the product in search results!`);
              console.error(`[DEBUG INFO] Current URL: ${page.url()}`);
              console.error(`[DEBUG INFO] Did the page load items? Check via logs or take screenshot.`);
              throw err;
            }
            

            // --- STAGE 3: ADD TO CART (With Ultra-Verbose Error Handling) ---
            console.log('[FLOW LOG] Awaiting "In winkelwagen" buy button visibility...');
            const buyButton = page.locator('[data-test="add-to-cart-button"]').first();
            
            try {
              await expect(buyButton).toBeVisible({ timeout: 20000 });
            } catch (err) {
              console.error(`\n[CRITICAL ERROR] The "In winkelwagen" button never appeared!`);
              console.error(`[DEBUG INFO] Failed on URL: ${page.url()}`);
              console.error(`[DEBUG INFO] This usually means we got logged out, blocked by anti-bot, or navigated to a broken page.`);
              throw err;
            }
            
            console.log('[FLOW LOG] Clicking to drop item in cart...');
            try {
              await buyButton.click();
            } catch (err) {
              console.error(`\n[CRITICAL ERROR] Failed to actually click the buy button.`);
              console.error(`[DEBUG INFO] Button HTML: ${await buyButton.evaluate(el => el.outerHTML).catch(() => 'unreadable')}`);
              throw err;
            }
            
            console.log('[FLOW LOG] Pausing 4000ms for network updates to conclude...');
            await page.waitForTimeout(4000); 
            
            console.log('[FLOW LOG] Verifying state by loading cart page...');
            await page.goto('https://www.bol.com/nl/nl/winkelwagentje/');
            console.log(`[FLOW LOG] Landed on cart check: ${page.url()}`);

            console.log('[FLOW LOG] Full sequence completed in continuous session. Shutting down browser.');
            await browser.close();
            console.log('[FLOW LOG] Done.\n');
          });
          EOF

          xvfb-run npx playwright test bol-flow.spec.js

      - name: "[Cleanup] Update master YAML file with login timestamp"
        shell: bash
        run: |
          set -euo pipefail
          echo "================================================================="
          echo " STEP 2: MARKING ACCOUNT AS USED"
          echo "================================================================="
          python <<'PY'
          import yaml
          import os
          from datetime import datetime, timezone

          path = "data/registered-emails.yml"
          email = os.environ.get("BOL_EMAIL")

          with open(path, "r", encoding="utf-8") as f:
              data = yaml.safe_load(f) or []

          updated = False
          now_str = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')
          
          for entry in data:
              if entry.get("email") == email:
                  entry["used_to_login"] = True
                  entry["last_login_at"] = now_str
                  updated = True
                  break

          if updated:
              with open(path, "w", encoding="utf-8") as f:
                  yaml.dump(data, f, default_flow_style=False, sort_keys=False, allow_unicode=True)
              print(f"[SUCCESS] Flagged {email} as used.")
          else:
              print("[WARNING] Could not locate account in dataset.")
          PY

      - name: "[Cleanup] Commit and push changes back to repository"
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/registered-emails.yml
          git diff --cached --quiet && exit 0
          git commit -m "Automated update: Locked out email $BOL_EMAIL"
          git push
