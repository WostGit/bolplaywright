name: Playwright Bol Unified Flow
on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  run-full-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    
    env:
      BOL_PASSWORD: ${{ secrets.BOL_PASSWORD }}
      PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
      PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
      PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
      # Optional for notifications
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: "[System] Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "[System] Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "[System] Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "[System] Install Python dependencies"
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: "[Prep] Extract unused email from YAML"
        id: get-email
        shell: bash
        run: |
          set -euo pipefail
          echo "================================================================="
          echo " STEP 0: EXTRACTING EMAIL ADDRESS"
          echo "================================================================="
          python <<'PY'
          import yaml
          import os

          path = "data/registered-emails.yml"
          if not os.path.exists(path):
              print("[FATAL ERROR] No registration file found at data/registered-emails.yml! Exiting.")
              exit(1)

          with open(path, "r", encoding="utf-8") as f:
              data = yaml.safe_load(f) or []

          target_account = None
          for entry in data:
              if not entry.get("used_to_login", False):
                  target_account = entry
                  break

          if not target_account:
              print("[FATAL ERROR] No unused accounts available for login!")
              exit(1)

          email = target_account["email"]
          print(f"[SUCCESS] Target account localized: {email}")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"BOL_EMAIL={email}\n")
          PY

      - name: "[Prep] Create project files dynamically"
        shell: bash
        run: |
          set -euo pipefail
          echo "================================================================="
          echo " STEP 0.5: WRITING PROJECT CONFIGS"
          echo "================================================================="
          
          cat > package.json <<'EOF'
          {
            "name": "bol-flow",
            "private": true,
            "devDependencies": {
              "@playwright/test": "^1.54.0",
              "playwright-extra": "^4.3.6",
              "puppeteer-extra-plugin-stealth": "^2.11.2"
            }
          }
          EOF
          echo "[INFO] package.json created."

          cat > playwright.config.js <<'EOF'
          const { defineConfig } = require('@playwright/test');
          module.exports = defineConfig({
            timeout: 300000, 
            expect: { timeout: 15000 },
            use: { 
              headless: false,
              viewport: { width: 1366, height: 768 }
            },
            projects: [{ name: 'chromium' }]
          });
          EOF
          echo "[INFO] playwright.config.js created."

      - name: "[System] Install Node Dependencies"
        shell: bash
        run: |
          echo "Running npm install..."
          npm install

      - name: "[System] Install Playwright Chromium with deps"
        shell: bash
        run: |
          echo "Downloading Chromium and system dependencies..."
          npx playwright install --with-deps chromium

      # ========================================================================
      # STEP 1: CREATE & RUN THE LOGIN JS SCRIPT
      # ========================================================================
      - name: "[Step 1] Execute Stealth Login"
        shell: bash
        run: |
          set -euo pipefail
          echo "================================================================="
          echo " STEP 1: INITIATING LOGIN AND STATE CREATION"
          echo "================================================================="
          
          cat > bol-login.spec.js <<'EOF'
          const { test, expect } = require('@playwright/test');
          const { chromium } = require('playwright-extra');
          const StealthPlugin = require('puppeteer-extra-plugin-stealth');
          const fs = require('fs');
          const path = require('path');
          
          chromium.use(StealthPlugin());

          test('Login flow and extract cookies', async () => {
            console.log('\n[LOGIN LOG] Script started.');
            const email = process.env.BOL_EMAIL;
            const password = process.env.BOL_PASSWORD;
            
            console.log(`[LOGIN LOG] Target account set to: ${email}`);
            console.log(`[LOGIN LOG] Proxy server set to: ${process.env.PROXY_SERVER}`);

            const browser = await chromium.launch({
              headless: false,
              args: ['--disable-blink-features=AutomationControlled']
            });
            console.log('[LOGIN LOG] Browser instance launched successfully.');
            
            const context = await browser.newContext({
              locale: 'nl-NL',
              timezoneId: 'Europe/Amsterdam',
              proxy: {
                server: process.env.PROXY_SERVER,
                username: process.env.PROXY_USERNAME,
                password: process.env.PROXY_PASSWORD
              }
            });
            console.log('[LOGIN LOG] Browser context instantiated with localized variables and proxy.');

            const page = await context.newPage();
            page.setDefaultTimeout(20000);

            console.log('[LOGIN LOG] Navigating to Bol.com main domain...');
            await page.goto('https://www.bol.com/nl/nl/', { waitUntil: 'domcontentloaded' });
            console.log(`[LOGIN LOG] Landed on initial URL: ${page.url()}`);
            
            console.log('[LOGIN LOG] Checking for cookie wall...');
            const cookieBtn = page.locator('button:has-text("Accepteren"), button:has-text("Alles accepteren")').first();
            if (await cookieBtn.isVisible()) {
              console.log('[LOGIN LOG] Cookie wall found! Clicking accept button.');
              await cookieBtn.click();
            } else {
              console.log('[LOGIN LOG] No cookie wall active or visible. Proceeding.');
            }

            console.log('[LOGIN LOG] Locating storefront login button...');
            await page.locator('a:has-text("Inloggen"), [data-test="login-link"]').first().click();
            
            console.log('[LOGIN LOG] Waiting for WSP Login Redirection...');
            await page.waitForURL('**/wsp/login**');
            console.log(`[LOGIN LOG] Successfully routed to login secure hub: ${page.url()}`);
            
            console.log('[LOGIN LOG] Injecting username/password strings...');
            await page.locator('input#username').fill(email);
            await page.locator('input#password').fill(password);
            
            console.log('[LOGIN LOG] Clicking submit...');
            await page.locator('button#submit').click();
            
            console.log('[LOGIN LOG] Waiting for post-login return to homepage...');
            await page.waitForURL('https://www.bol.com/nl/nl/', { timeout: 25000 });
            
            console.log(`[LOGIN LOG] Secure handshake complete! Final destination: ${page.url()}`);
            
            const statePath = path.join(process.cwd(), 'state.json');
            console.log(`[LOGIN LOG] Dumping session cookies and site local storage to: ${statePath}`);
            await context.storageState({ path: statePath });

            console.log('[LOGIN LOG] Verifying state.json was physically created...');
            if (fs.existsSync(statePath)) {
                console.log(`[LOGIN LOG] Verified! File size: ${fs.statSync(statePath).size} bytes.`);
            } else {
                throw new Error('[LOGIN LOG] state.json creation failed physically.');
            }

            await browser.close();
            console.log('[LOGIN LOG] Isolated Login Browser closed safely.\n');
          });
          EOF

          # Added DEBUG=pw:api to make standard Playwright output ultra verbose
          DEBUG=pw:api xvfb-run npx playwright test bol-login.spec.js

      # ========================================================================
      # STEP 2: CREATE & RUN THE CART JS SCRIPT
      # ========================================================================
      - name: "[Step 2] Execute Add to Cart"
        shell: bash
        run: |
          set -euo pipefail
          echo "================================================================="
          echo " STEP 2: RESTORING STATE AND EXECUTING ORDER"
          echo "================================================================="

          cat > bol-cart.spec.js <<'EOF'
          const { test, expect } = require('@playwright/test');
          const { chromium } = require('playwright-extra');
          const StealthPlugin = require('puppeteer-extra-plugin-stealth');
          const fs = require('fs');
          const path = require('path');
          
          chromium.use(StealthPlugin());

          test('Restore context and operate in active session', async () => {
            console.log('\n[CART LOG] Cart script started.');
            
            const statePath = path.join(process.cwd(), 'state.json');
            console.log(`[CART LOG] Looking for state at project root: ${statePath}`);
            
            if (!fs.existsSync(statePath)) {
              console.log(`[FATAL ERROR] Expected storage file missing at: ${statePath}`);
              throw new Error('[CART LOG] Handshake broken: state.json was not generated by Step 1.');
            }
            console.log(`[CART LOG] state.json found! Loading state content...`);

            const browser = await chromium.launch({
              headless: false,
              args: ['--disable-blink-features=AutomationControlled']
            });
            console.log('[CART LOG] Cart browser instance spawned.');
            
            console.log('[CART LOG] RESTORING STATE: Injecting the cookie dictionary...');
            const context = await browser.newContext({
              storageState: statePath, // <-- THIS IS THE BRIDGE
              locale: 'nl-NL',
              timezoneId: 'Europe/Amsterdam',
              proxy: {
                server: process.env.PROXY_SERVER,
                username: process.env.PROXY_USERNAME,
                password: process.env.PROXY_PASSWORD
              }
            });

            const page = await context.newPage();
            page.setDefaultTimeout(20000);

            console.log('[CART LOG] Navigating directly to product page bypass...');
            await page.goto('https://www.bol.com/nl/nl/p/apple-airtag-4-stuks/9300000035840899/', { waitUntil: 'domcontentloaded' });
            console.log(`[CART LOG] Landed on: ${page.url()}`);
            
            console.log('[CART LOG] Looking for "In winkelwagen" trigger button...');
            const buyButton = page.locator('[data-test="add-to-cart-button"]').first();
            await expect(buyButton).toBeVisible({ timeout: 15000 });
            
            console.log('[CART LOG] Button is visible. Forcing click operation...');
            await buyButton.click();
            
            console.log('[CART LOG] Sleeping for 4000ms to allow basket payload scripts to register...');
            await page.waitForTimeout(4000); 
            
            console.log('[CART LOG] Shifting directly to cart review page to double check state...');
            await page.goto('https://www.bol.com/nl/nl/winkelwagentje/');
            console.log(`[CART LOG] Final verification URL: ${page.url()}`);

            console.log('[CART LOG] Cart operation completed. Shutting down browser.');
            await browser.close();
            console.log('[CART LOG] Session successfully transferred and executed.\n');
          });
          EOF

          # Added DEBUG=pw:api to produce massive API call tracing
          DEBUG=pw:api xvfb-run npx playwright test bol-cart.spec.js

      - name: "[Cleanup] Update master YAML file with login timestamp"
        shell: bash
        run: |
          set -euo pipefail
          echo "================================================================="
          echo " STEP 3: WRAPPING UP AND CLEANING SESSIONS"
          echo "================================================================="
          python <<'PY'
          import yaml
          import os
          from datetime import datetime, timezone

          path = "data/registered-emails.yml"
          email = os.environ.get("BOL_EMAIL")

          with open(path, "r", encoding="utf-8") as f:
              data = yaml.safe_load(f) or []

          updated = False
          now_str = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')
          
          for entry in data:
              if entry.get("email") == email:
                  entry["used_to_login"] = True
                  entry["last_login_at"] = now_str
                  updated = True
                  break

          if updated:
              with open(path, "w", encoding="utf-8") as f:
                  yaml.dump(data, f, default_flow_style=False, sort_keys=False, allow_unicode=True)
              print(f"[SUCCESS] Flagged {email} as used in local database.")
          else:
              print("[WARNING] Could not locate the manipulated account in dataset.")
          PY

      - name: "[Cleanup] Commit and push changes back to repository"
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/registered-emails.yml
          git diff --cached --quiet && exit 0
          git commit -m "Automated update: Locked out email $BOL_EMAIL"
          git push

      - name: "[System] Retain Auth State as downloadable artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-state
          path: state.json
          retention-days: 1
