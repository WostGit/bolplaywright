name: "Bol - Step 2: Search & Add to Cart"

on:
  workflow_call:
    inputs:
      bol-email:
        required: true
        type: string

jobs:
  search-add-cart:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      BOL_EMAIL: ${{ inputs.bol-email }}
      PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
      PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
      PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install @playwright/test
          npx playwright install --with-deps chromium

      - name: Execute Search & Add to Cart
        shell: bash
        run: |
          set -euo pipefail
          echo "================================================================="
          echo " STEP 2: SEARCH + ADD TO CART"
          echo "================================================================="
          
          cat > bol-search-cart.spec.js <<'EOF'
          const { test, chromium } = require('@playwright/test');
          const fs = require('fs');
          const path = require('path');

          test('Add AirTag to Cart', async () => {
            const botToken = process.env.TELEGRAM_BOT_TOKEN;
            const chatId = process.env.TELEGRAM_CHAT_ID;

            async function sendTelegramAlert(filePath, caption) {
              if (!botToken || !chatId) return;
              try {
                const { request } = require('@playwright/test');
                const apiContext = await request.newContext();
                const buffer = fs.readFileSync(filePath);
                await apiContext.post(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                  multipart: {
                    chat_id: chatId,
                    caption: caption,
                    photo: {
                      name: path.basename(filePath),
                      mimeType: 'image/png',
                      buffer: buffer
                    }
                  }
                });
              } catch (e) {
                console.error('Telegram Error:', e.message);
              }
            }

            const browser = await chromium.launch({ headless: true }); // Headless is usually safer for CI
            const context = await browser.newContext({
              proxy: {
                server: process.env.PROXY_SERVER,
                username: process.env.PROXY_USERNAME,
                password: process.env.PROXY_PASSWORD
              }
            });
            const page = await context.newPage();

            try {
              // Direct add-to-cart URL
              await page.goto('https://www.bol.com/nl/order/basket/addItems.html?productId=9300000035840899&offerUid=5589e402-f3f8-446a-8495-383cb58b6cb6&quantity=1', { waitUntil: 'networkidle' });
              
              // Verify cart
              await page.goto('https://www.bol.com/nl/nl/winkelwagentje/', { waitUntil: 'networkidle' });
              await page.waitForTimeout(2000);
              
              const screenshotPath = 'cart-added-success.png';
              await page.screenshot({ path: screenshotPath, fullPage: true });
              await sendTelegramAlert(screenshotPath, '✅ Product added to cart successfully');
              console.log('Added to cart successfully');
            } catch (err) {
              console.error('Task Failed:', err.message);
              throw err;
            } finally {
              await context.close();
              await browser.close();
            }
          });
          EOF

          xvfb-run npx playwright test bol-search-cart.spec.js
