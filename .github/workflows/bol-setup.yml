name: Bol - Setup (Extract Email + Prepare)

on:
  workflow_call:
    outputs:
      bol-email:
        description: "Selected unused email"
        value: ${{ jobs.setup.outputs.bol-email }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      bol-email: ${{ steps.get-email.outputs.bol-email }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Extract unused email from YAML
        id: get-email
        shell: bash
        run: |
          set -euo pipefail
          echo "================================================================="
          echo " STEP 0: EXTRACTING EMAIL ADDRESS"
          echo "================================================================="
          python <<'PY'
          import yaml
          import os
          import sys

          path = "data/registered-emails.yml"
          if not os.path.exists(path):
              print("[FATAL ERROR] No registration file found!")
              sys.exit(1)

          with open(path, "r", encoding="utf-8") as f:
              data = yaml.safe_load(f) or []

          target_account = None
          for entry in data:
              if not entry.get("used_to_login", False):
                  target_account = entry
                  break

          if not target_account:
              print("[FATAL ERROR] No unused accounts available!")
              sys.exit(1)

          email = target_account["email"]
          print(f"[SUCCESS] Target account: {email}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"bol-email={email}\n")
          PY

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create project files dynamically
        shell: bash
        run: |
          set -euo pipefail
          cat > package.json <<'EOF'
          {
            "name": "bol-flow",
            "private": true,
            "devDependencies": {
              "@playwright/test": "^1.54.0"
            }
          }
          EOF

          cat > playwright.config.js <<'EOF'
          const { defineConfig } = require('@playwright/test');

          module.exports = defineConfig({
            timeout: 300000,
            expect: { timeout: 15000 },
            use: {
              headless: true,
              viewport: { width: 1366, height: 768 },
              actionTimeout: 40000,
              navigationTimeout: 60000
            },
            projects: [{ name: 'chromium' }]
          });
          EOF

      - name: Install Node Dependencies
        run: npm install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        shell: bash
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            echo "[CACHE HIT] Skipping browser download..."
            npx playwright install-deps chromium
          else
            echo "[CACHE MISS] Downloading browser..."
            npx playwright install --with-deps chromium
          fi
