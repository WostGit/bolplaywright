name: Bol - 1. Extract Unused Email

on:
  workflow_call:
    outputs:
      bol-email:
        description: "The selected unused email address"
        value: ${{ jobs.extract.outputs.bol-email }}

jobs:
  extract:
    runs-on: ubuntu-latest
    outputs:
      bol-email: ${{ steps.get-email.outputs.bol-email }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Extract unused email from YAML
        id: get-email
        shell: bash
        run: |
          set -euo pipefail
          echo "================================================================="
          echo " STEP 0: EXTRACTING EMAIL ADDRESS"
          echo "================================================================="
          python <<'PY'
          import yaml
          import os
          import sys

          path = "data/registered-emails.yml"
          if not os.path.exists(path):
              print("[FATAL ERROR] No registration file found!")
              sys.exit(1)

          with open(path, "r", encoding="utf-8") as f:
              data = yaml.safe_load(f) or []

          target_account = None
          for entry in data:
              if not entry.get("used_to_login", False):
                  target_account = entry
                  break

          if not target_account:
              print("[FATAL ERROR] No unused accounts available for login!")
              sys.exit(1)

          email = target_account["email"]
          print(f"[SUCCESS] Target account localized: {email}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"bol-email={email}\n")
          PY
